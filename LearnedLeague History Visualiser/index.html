<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearnedLeague History Visualiser</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <div id="header-title">
            <h1>LearnedLeague History Visualiser</h1>
            <p><a href="../index.html">← Back to all projects</a></p>
        </div>

        <div id="upload-section">
            <div class="upload-group">
                <label for="profile-input">Profile page (HTML)</label>
                <input type="file" id="profile-input" accept=".html,.htm">
            </div>
            <button id="load-btn">Visualise</button>
            <p id="status-msg" class="status"></p>
        </div>

        <div id="view-toggle" class="hidden">
            <button id="btn-answers" class="view-btn active">Answers</button>
            <button id="btn-subjectseasons" class="view-btn">Subject Seasons</button>
            <button id="btn-timeline" class="view-btn">Timeline</button>
            <button id="btn-subjects" class="view-btn">By Subject</button>
            <button id="btn-flip-axis" class="view-btn flip-btn" title="Flip the vertical axis direction">⇅ Flip
                axis</button>
        </div>

        <div id="subject-tray" class="hidden"></div>
    </header>

    <main>

        <!-- ── Chart ───────────────────────────────────────────────────────────── -->
        <section id="chart-section" class="hidden">

            <div id="chart-outer">
                <div id="y-axis-wrapper"></div>
                <div id="chart-container"></div>
            </div>

            <div id="chart-legend"></div>

        </section>

    </main>

    <div id="tooltip" class="hidden"></div>

    <script src="answers.js"></script>
    <script src="pct.js"></script>
    <script src="parser.js"></script>
    <script src="chart.js"></script>
    <script src="main.js"></script>

</body>

</html>
