                    var hli = 0;
                    for (var phi = 0; phi < HARM_LABEL_COUNT; phi++) {
                        harmLabelPool[phi].setAttribute('display', 'none');
                        harmLabelBgPool[phi].setAttribute('display', 'none');
                        harmLabelH5Pool[phi].setAttribute('display', 'none');
                    }
                    // Collect note label positions so harmonic labels avoid them
                    var occupiedPositions = [];
                    for (var oti = 0; oti < tickCount; oti++) {
                        if (tickLabels[oti].getAttribute('display') !== 'none') {
                            occupiedPositions.push({
                                x: parseFloat(tickLabels[oti].getAttribute('x')),
                                y: parseFloat(tickLabels[oti].getAttribute('y'))
                            });
                        }
                    }
                    for (var ti2 = 0; ti2 < tickCount; ti2++) {
                        var baseMidi = spiralMidiLo + ti2;
                        if (baseMidi > 50) continue; // only show harmonics for notes up to D3
                        var baseFreq = 440 * Math.pow(2, (baseMidi - 69) / 12);
                        var baseNotePC = baseMidi % 12;
                        var baseRelPC = ((baseNotePC - vTonic) % 12 + 12) % 12;
                        if (!vScaleSet.has(baseRelPC)) continue;
                        for (var hn = 2; hn <= maxHarmLabel; hn++) {
                            var harmFreq = baseFreq * hn;
                            var harmMidi = 69 + 12 * Math.log2(harmFreq / 440);
                            if (harmMidi < spiralMidiLo || harmMidi > spiralMidiHi) continue;
                            if (hli >= HARM_LABEL_COUNT) break;
                            var hTheta = spiralThetaForMidi(harmMidi);
                            var hR = spiralR(hTheta);
                            var hAng = -Math.PI / 2 + hTheta + spiralRotOffset;
                            var hCos = Math.cos(hAng), hSin = Math.sin(hAng);
                            // Try outside, then inside, skip if both overlap
                            var hLblR = hR + 20;
                            var hx = cx + hLblR * hCos, hy = cy + hLblR * hSin;
                            var overlaps = false;
                            for (var pi = 0; pi < occupiedPositions.length; pi++) {
                                var dx = hx - occupiedPositions[pi].x;
                                var dy = hy - occupiedPositions[pi].y;
                                if (dx * dx + dy * dy < 400) { overlaps = true; break; }
                            }
                            if (overlaps) {
                                hLblR = hR - 20;
                                hx = cx + hLblR * hCos;
                                hy = cy + hLblR * hSin;
                                overlaps = false;
                                for (var pi2 = 0; pi2 < occupiedPositions.length; pi2++) {
                                    var dx2 = hx - occupiedPositions[pi2].x;
                                    var dy2 = hy - occupiedPositions[pi2].y;
                                    if (dx2 * dx2 + dy2 * dy2 < 400) { overlaps = true; break; }
                                }
                            }
                            if (overlaps) continue; // skip this label entirely
                            occupiedPositions.push({ x: hx, y: hy });
                            // Colors: same as fundamental note label
                            var hFillColor = spiralPCColor(baseNotePC);
                            var hH3Idx = (baseNotePC + 7) % 12;
                            var hH5Idx = (baseNotePC + 4) % 12;
                            var hH3Color = spiralPCColor(hH3Idx);
                            var hH5Color = spiralPCColor(hH5Idx);
                            var hText = hn + '×' + displayName(NOTES[baseNotePC]);
                            // Outer ellipse: h5 outline
                            var hH5El = harmLabelH5Pool[hli];
                            var hFS = 11;
                            var hRx = hText.length * hFS * 0.3 + 3;
                            var hRy = hFS * 0.55;
                            var hh5sw = 1.5;
                            var hh3sw = 1.5;
                            hH5El.setAttribute('cx', hx.toFixed(2));
                            hH5El.setAttribute('cy', hy.toFixed(2));
                            hH5El.setAttribute('rx', (hRx + hh3sw + hh5sw * 0.5).toFixed(1));
                            hH5El.setAttribute('ry', (hRy + hh3sw + hh5sw * 0.5).toFixed(1));
                            hH5El.setAttribute('fill', 'none');
                            hH5El.setAttribute('stroke', hH5Color);
                            hH5El.setAttribute('stroke-width', '1.5');
                            hH5El.setAttribute('display', '');
                            // Inner ellipse: h3 outline + note color fill
                            var hBg = harmLabelBgPool[hli];
                            hBg.setAttribute('cx', hx.toFixed(2));
                            hBg.setAttribute('cy', hy.toFixed(2));
                            hBg.setAttribute('rx', hRx.toFixed(1));
                            hBg.setAttribute('ry', hRy.toFixed(1));
                            hBg.setAttribute('fill', hFillColor);
                            hBg.setAttribute('stroke', hH3Color);
                            hBg.setAttribute('stroke-width', '1.5');
                            hBg.setAttribute('display', '');
                            // Black text on oval
                            var hEl = harmLabelPool[hli];
                            hEl.setAttribute('x', hx.toFixed(2));
                            hEl.setAttribute('y', hy.toFixed(2));
                            hEl.setAttribute('dy', '0.35em');
                            hEl.setAttribute('font-size', '11');
                            hEl.setAttribute('fill', '#000');
                            hEl.setAttribute('stroke', 'none');
                            hEl.setAttribute('display', '');
                            hEl.textContent = hText;
                            hli++;
                        }
                    }

                } // end if (showSpiral)

                // ── Circle mode rendering — dissonance RGB fill ──
                if (showRings) {
                    var stepAng = Math.PI / 6; // 30° per semitone
                    function circAngle(pc) {
                        return -Math.PI / 2 + ((pc - vTonic + 12) % 12) * stepAng;
                    }

                    // Dissonance curve: peaks near ~0.7 semitones, sharp falloff
                    var dissB = 0.7;
                    function diss(d) {
                        d = Math.abs(d);
                        if (d <= 0) return 0;
                        return (d / dissB) * Math.exp(1 - d / dissB);
                    }

                    // Harmonics 1–6 for both note and tonic
                    var harmonics = [1, 2, 3, 4, 5, 6];
                    var log2cache = [0, 0];
                    for (var lci = 1; lci <= 6; lci++) log2cache[lci] = Math.log2(lci);

                    // Compute tension for each of 12 semitone offsets
                    var noteTension = [];
                    var tensionMin = Infinity, tensionMax = -Infinity;
                    for (var ti = 0; ti < 12; ti++) {
                        var s = ti;
                        var total = 0;
                        for (var ni2 = 0; ni2 < harmonics.length; ni2++) {
                            var nH = harmonics[ni2];
                            var nW = 1 / nH;
                            for (var mi2 = 0; mi2 < harmonics.length; mi2++) {
                                var mH = harmonics[mi2];
                                var mW = 1 / mH;
                                var interval = s + 12 * (log2cache[nH] - log2cache[mH]);
                                total += nW * mW * diss(interval);
                            }
                        }
                        noteTension.push(total);
                        if (total < tensionMin) tensionMin = total;
                        if (total > tensionMax) tensionMax = total;
                    }
                    // Normalize to 0–1
                    var tensionRange = tensionMax - tensionMin;
                    var noteT = [];
                    for (var ti2 = 0; ti2 < 12; ti2++) {
                        noteT.push(tensionRange > 0 ? (noteTension[ti2] - tensionMin) / tensionRange : 0);
                    }

                    // Wide-range sequential palette: deep indigo → blue → teal → green → gold → red
                    // More hue stops + lightness variation for better distinction
                    var palStops = [
                        { t: 0.0, h: 270, s: 55, l: 30 },  // deep indigo
                        { t: 0.15, h: 230, s: 65, l: 38 },  // blue
                        { t: 0.3, h: 190, s: 70, l: 40 },  // teal
                        { t: 0.45, h: 150, s: 60, l: 42 },  // green
                        { t: 0.6, h: 90, s: 55, l: 40 },  // lime
                        { t: 0.75, h: 45, s: 85, l: 48 },  // gold
                        { t: 0.9, h: 15, s: 80, l: 48 },  // orange
                        { t: 1.0, h: 350, s: 70, l: 42 }   // crimson
                    ];
                    function tensionColor(t) {
                        if (t <= 0) return 'hsl(' + palStops[0].h + ',' + palStops[0].s + '%,' + palStops[0].l + '%)';
                        if (t >= 1) { var last = palStops[palStops.length - 1]; return 'hsl(' + last.h + ',' + last.s + '%,' + last.l + '%)'; }
                        for (var pi = 0; pi < palStops.length - 1; pi++) {
                            if (t >= palStops[pi].t && t <= palStops[pi + 1].t) {
                                var f = (t - palStops[pi].t) / (palStops[pi + 1].t - palStops[pi].t);
                                var h = palStops[pi].h + f * (palStops[pi + 1].h - palStops[pi].h);
                                var s2 = palStops[pi].s + f * (palStops[pi + 1].s - palStops[pi].s);
                                var l = palStops[pi].l + f * (palStops[pi + 1].l - palStops[pi].l);
                                return 'hsl(' + Math.round(h) + ',' + Math.round(s2) + '%,' + Math.round(l) + '%)';
                            }
                        }
                        return '#888';
                    }

                    // Build color array for each semitone offset (indexed by offset from tonic)
                    var noteColors = [];
                    for (var ci3 = 0; ci3 < 12; ci3++) noteColors.push(tensionColor(noteT[ci3]));
                    // Also build a map by pitch class for easy lookup
                    var pcColor = {};
                    for (var ci4 = 0; ci4 < 12; ci4++) pcColor[(vTonic + ci4) % 12] = noteColors[ci4];

                    // Hide dissonance wedges — white background
                    for (var wi = 0; wi < NUM_DISS_WEDGES; wi++) dissWedges[wi].setAttribute('display', 'none');

                    outerCircle.setAttribute('stroke', '#ccc');
                    outerCircle.setAttribute('display', '');

                    // Draw background radial lines — all 12 positions, thicker for in-scale
                    for (var bri = 0; bri < 12; bri++) {
                        var brPC = (vTonic + bri) % 12;
                        var brAng = circAngle(brPC);
                        var brCos = Math.cos(brAng), brSin = Math.sin(brAng);
                        var brInScale = vScaleSet.has(bri);
                        bgRadials[bri].setAttribute('x1', cx);
                        bgRadials[bri].setAttribute('y1', cy);
                        bgRadials[bri].setAttribute('x2', (cx + circleR * brCos).toFixed(2));
                        bgRadials[bri].setAttribute('y2', (cy + circleR * brSin).toFixed(2));
                        bgRadials[bri].setAttribute('stroke', noteColors[bri]);
                        bgRadials[bri].setAttribute('stroke-width', brInScale ? '1.2' : '0.4');
                        bgRadials[bri].setAttribute('opacity', brInScale ? '0.3' : '0.12');
                        bgRadials[bri].setAttribute('display', '');
                    }

                    // Draw 12 tick marks + labels — colored by tension
                    for (var ri = 0; ri < 12; ri++) {
                        var pc = (vTonic + ri) % 12;
                        var ang = circAngle(pc);
                        var cos = Math.cos(ang), sin = Math.sin(ang);
                        circTicks[ri].setAttribute('x1', (cx + circleR * cos).toFixed(2));
                        circTicks[ri].setAttribute('y1', (cy + circleR * sin).toFixed(2));
                        circTicks[ri].setAttribute('x2', (cx + (circleR - tickLen) * cos).toFixed(2));
                        circTicks[ri].setAttribute('y2', (cy + (circleR - tickLen) * sin).toFixed(2));
                        circTicks[ri].setAttribute('stroke', noteColors[ri]);
                        circTicks[ri].setAttribute('stroke-width', '2');
                        circTicks[ri].setAttribute('stroke-linecap', 'round');
                        circTicks[ri].setAttribute('display', '');

                        circLabels[ri].setAttribute('x', (cx + labelR * cos).toFixed(2));
                        circLabels[ri].setAttribute('y', (cy + labelR * sin).toFixed(2));
                        circLabels[ri].setAttribute('dy', '0.35em');
                        circLabels[ri].setAttribute('fill', noteColors[ri]);
                        circLabels[ri].setAttribute('font-size', '16');
                        circLabels[ri].setAttribute('display', '');
                        circLabels[ri].textContent = displayName(NOTES[pc]);
                    }

                    // Draw arrows — colored outlines, between notes
                    var tonicAng = circAngle(vTonic);
                    var midBelow1 = tonicAng - stepAng * 0.5;
                    var midAbove1 = tonicAng + stepAng * 0.5;
                    circArrows[0].setAttribute('d', circArrowPath(midBelow1, tonicAng, circleR, ''));
                    circArrows[0].setAttribute('fill', 'none');
                    circArrows[0].setAttribute('stroke', pcColor[vTonic]);
                    circArrows[0].setAttribute('stroke-width', '1.5');
                    circArrows[0].setAttribute('display', '');
                    circArrows[1].setAttribute('d', circArrowPath(midAbove1, tonicAng, circleR, ''));
                    circArrows[1].setAttribute('fill', 'none');
                    circArrows[1].setAttribute('stroke', pcColor[vTonic]);
                    circArrows[1].setAttribute('stroke-width', '1.5');
                    circArrows[1].setAttribute('display', '');
                    var thirdPC = (vTonic + 4) % 12;
                    var thirdAng = circAngle(thirdPC);
                    var midBelow3 = thirdAng - stepAng * 0.5;
                    var midAbove3 = thirdAng + stepAng * 0.5;
                    circArrows[2].setAttribute('d', circArrowPath(midBelow3, thirdAng, circleR - tickLen * 0.5, ''));
                    circArrows[2].setAttribute('fill', 'none');
                    circArrows[2].setAttribute('stroke', pcColor[thirdPC]);
                    circArrows[2].setAttribute('stroke-width', '1.5');
                    circArrows[2].setAttribute('display', '');
                    circArrows[3].setAttribute('d', circArrowPath(midAbove3, thirdAng, circleR - tickLen * 0.5, ''));
                    circArrows[3].setAttribute('fill', 'none');
                    circArrows[3].setAttribute('stroke', pcColor[thirdPC]);
                    circArrows[3].setAttribute('stroke-width', '1.5');
                    circArrows[3].setAttribute('display', '');
                    var fifthPC = (vTonic + 7) % 12;
                    var fifthAng = circAngle(fifthPC);
                    var midBelow5 = fifthAng - stepAng * 0.5;
                    var midAbove5 = fifthAng + stepAng * 0.5;
                    circArrows[4].setAttribute('d', circArrowPath(midBelow5, fifthAng, circleR - tickLen * 0.5, ''));
                    circArrows[4].setAttribute('fill', 'none');
                    circArrows[4].setAttribute('stroke', pcColor[fifthPC]);
                    circArrows[4].setAttribute('stroke-width', '1.5');
                    circArrows[4].setAttribute('display', '');
                    circArrows[5].setAttribute('d', circArrowPath(midAbove5, fifthAng, circleR - tickLen * 0.5, ''));
                    circArrows[5].setAttribute('fill', 'none');
                    circArrows[5].setAttribute('stroke', pcColor[fifthPC]);
                    circArrows[5].setAttribute('stroke-width', '1.5');
                    circArrows[5].setAttribute('display', '');

                    // ── 3-layer chord system: root / third / fifth ──
                    var seq = (typeof sequences !== 'undefined' && typeof activeSequenceIdx !== 'undefined')
                        ? sequences[activeSequenceIdx] : null;
                    var chords = seq ? seq.chords.filter(function (c) { return c !== null; }) : [];

                    // Show 3 layer reference circles + labels
                    var layerLabelAng = -Math.PI * 0.75; // label position angle
                    for (var li = 0; li < 3; li++) {
                        layerCircles[li].setAttribute('r', layerR[li]);
                        layerCircles[li].setAttribute('stroke', 'rgba(0,0,0,0.08)');
                        layerCircles[li].setAttribute('display', '');
                        layerLabelEls[li].setAttribute('x', (cx + (layerR[li] + 8) * Math.cos(layerLabelAng)).toFixed(2));
                        layerLabelEls[li].setAttribute('y', (cy + (layerR[li] + 8) * Math.sin(layerLabelAng)).toFixed(2));
                        layerLabelEls[li].setAttribute('dy', '0.35em');
                        layerLabelEls[li].textContent = LAYER_NAMES[li];
                        layerLabelEls[li].setAttribute('display', '');
                    }

                    // Reset pools
                    for (var si2 = 0; si2 < MAX_SEGS; si2++) chordSegs[si2].setAttribute('display', 'none');
                    for (var cli = 0; cli < MAX_CONNECTORS; cli++) chordConnectors[cli].setAttribute('display', 'none');
                    for (var cli2 = 0; cli2 < MAX_CHORD_ARCS; cli2++) chordArcLabels[cli2].setAttribute('display', 'none');
                    for (var vi = 0; vi < MAX_VL_ARROWS; vi++) vlArrows[vi].setAttribute('display', 'none');

                    // VL distance helper
                    function vlSemDist(a, b) {
                        var d = ((b - a) % 12 + 12) % 12;
                        return Math.min(d, 12 - d);
                    }

                    var segIdx = 0;
                    var vli = 0;
                    var connIdx = 0;
                    var prevVoices = null; // array of {pc, layer, ang}

                    // Optimal voice-leading matcher (brute-force, minimises total semitone movement)
                    function vlBestMatch(prev, cur) {
                        var n = cur.length, m = prev.length;
                        if (n === 0 || m === 0) return [];
                        var bestTotal = Infinity, bestAssign = null;
                        function search(chosen, used) {
                            if (chosen.length === n) {
                                var total = 0;
                                for (var i = 0; i < n; i++) total += vlSemDist(prev[chosen[i]].pc, cur[i].pc);
                                if (total < bestTotal) { bestTotal = total; bestAssign = chosen.slice(); }
                                return;
                            }
                            for (var j = 0; j < m; j++) {
                                if (!used[j]) { used[j] = true; chosen.push(j); search(chosen, used); chosen.pop(); used[j] = false; }
                            }
                        }
                        search([], {});
                        return bestAssign || [];
                    }

                    // Helper: build filled arc band between two (r, ang) points along a given radius
                    function arcBandPath(r1, ang1, r2, ang2, bandW) {
                        // Thin filled arc from (r1,ang1) to (r2,ang2) — both at some radius,
                        // but here we draw along a mid-radius between the two layers
                        var halfW = bandW / 2;
                        // For same-angle radial connector, draw a thin radial rect
                        var angDiff2 = ang2 - ang1;
                        while (angDiff2 > Math.PI) angDiff2 -= 2 * Math.PI;
                        while (angDiff2 < -Math.PI) angDiff2 += 2 * Math.PI;
                        // If angular distance is very small, draw radial band
                        if (Math.abs(angDiff2) < 0.01) {
                            var midAng2 = ang1;
                            var outerR = Math.max(r1, r2);
                            var innerR = Math.min(r1, r2);
                            return 'M ' + (cx + outerR * Math.cos(midAng2 - halfW / outerR)).toFixed(2) + ' ' + (cy + outerR * Math.sin(midAng2 - halfW / outerR)).toFixed(2) +
                                ' L ' + (cx + outerR * Math.cos(midAng2 + halfW / outerR)).toFixed(2) + ' ' + (cy + outerR * Math.sin(midAng2 + halfW / outerR)).toFixed(2) +
                                ' L ' + (cx + innerR * Math.cos(midAng2 + halfW / innerR)).toFixed(2) + ' ' + (cy + innerR * Math.sin(midAng2 + halfW / innerR)).toFixed(2) +
                                ' L ' + (cx + innerR * Math.cos(midAng2 - halfW / innerR)).toFixed(2) + ' ' + (cy + innerR * Math.sin(midAng2 - halfW / innerR)).toFixed(2) +
                                ' Z';
                        }
                        // Filled arc band: sweep from ang1 to ang2 at the mid-radius between r1 and r2
                        // Use r1 for start, r2 for end, arc along midR
                        var midR = (r1 + r2) / 2;
                        var sweepDir = angDiff2 > 0 ? 1 : 0;
                        var nArcPts = 12;
                        var pts = [];
                        // Outer edge
                        for (var ai = 0; ai <= nArcPts; ai++) {
                            var frac = ai / nArcPts;
                            var aR = r1 + (r2 - r1) * frac;
                            var aAng = ang1 + angDiff2 * frac;
                            pts.push([cx + (aR + halfW) * Math.cos(aAng), cy + (aR + halfW) * Math.sin(aAng)]);
                        }
                        // Inner edge (reverse)
                        for (var ai2 = nArcPts; ai2 >= 0; ai2--) {
                            var frac2 = ai2 / nArcPts;
                            var aR2 = r1 + (r2 - r1) * frac2;
                            var aAng2 = ang1 + angDiff2 * frac2;
                            pts.push([cx + (aR2 - halfW) * Math.cos(aAng2), cy + (aR2 - halfW) * Math.sin(aAng2)]);
                        }
                        var d3 = 'M ' + pts[0][0].toFixed(2) + ' ' + pts[0][1].toFixed(2);
                        for (var pi = 1; pi < pts.length; pi++) d3 += ' L ' + pts[pi][0].toFixed(2) + ' ' + pts[pi][1].toFixed(2);
                        return d3 + ' Z';
                    }

                    for (var chi = 0; chi < chords.length && chi < MAX_CHORD_ARCS; chi++) {
                        var item = chords[chi];
                        var rm = item.chord && item.chord.name ? item.chord.name.match(/^([A-G]#?)/) : null;
                        if (!rm) continue;
                        var rootName = rm[1];
                        var rootIdx = NOTES.indexOf(rootName);
                        if (rootIdx < 0) continue;
                        var intervals = getChordIntervals(item);
                        var voiceCount = Math.min(intervals.length, 3);
                        var voices = [];
                        for (var vi2 = 0; vi2 < voiceCount; vi2++) {
                            var vpc = (rootIdx + intervals[vi2]) % 12;
                            var vang = circAngle(vpc);
                            voices.push({ pc: vpc, layer: vi2, ang: vang });
                        }

                        // Draw annular segments on each layer
                        var segHalfAng = stepAng * 0.4;
                        for (var vi3 = 0; vi3 < voices.length && segIdx < MAX_SEGS; vi3++) {
                            var v = voices[vi3];
                            var lr = layerR[v.layer];
                            var rInner = lr - layerThick;
                            var rOuter = lr + layerThick;
                            var a1 = v.ang - segHalfAng;
                            var a2 = v.ang + segHalfAng;
                            var ox1 = cx + rOuter * Math.cos(a1), oy1 = cy + rOuter * Math.sin(a1);
                            var ox2 = cx + rOuter * Math.cos(a2), oy2 = cy + rOuter * Math.sin(a2);
                            var ix1 = cx + rInner * Math.cos(a1), iy1 = cy + rInner * Math.sin(a1);
                            var ix2 = cx + rInner * Math.cos(a2), iy2 = cy + rInner * Math.sin(a2);
                            var segD = 'M ' + ox1.toFixed(2) + ' ' + oy1.toFixed(2) +
                                ' A ' + rOuter + ' ' + rOuter + ' 0 0 1 ' + ox2.toFixed(2) + ' ' + oy2.toFixed(2) +
                                ' L ' + ix2.toFixed(2) + ' ' + iy2.toFixed(2) +
                                ' A ' + rInner + ' ' + rInner + ' 0 0 0 ' + ix1.toFixed(2) + ' ' + iy1.toFixed(2) +
                                ' Z';
                            chordSegs[segIdx].setAttribute('d', segD);
                            chordSegs[segIdx].setAttribute('fill', pcColor[v.pc]);
                            chordSegs[segIdx].setAttribute('stroke', '#fff');
                            chordSegs[segIdx].setAttribute('stroke-width', '1');
                            chordSegs[segIdx].setAttribute('opacity', '0.85');
                            chordSegs[segIdx].setAttribute('display', '');
                            segIdx++;
                        }

                        // Draw filled arc connectors between layers (root→third, third→fifth)
                        for (var ci = 0; ci < voices.length - 1 && connIdx < MAX_CONNECTORS; ci++) {
                            var vFrom = voices[ci];
                            var vTo = voices[ci + 1];
                            var connR1 = layerR[vFrom.layer] - layerThick; // inner edge of outer layer
                            var connR2 = layerR[vTo.layer] + layerThick;   // outer edge of inner layer
                            var connD = arcBandPath(connR1, vFrom.ang, connR2, vTo.ang, 5);
                            chordConnectors[connIdx].setAttribute('d', connD);
                            chordConnectors[connIdx].setAttribute('fill', pcColor[vFrom.pc]);
                            chordConnectors[connIdx].setAttribute('opacity', '0.4');
                            chordConnectors[connIdx].setAttribute('display', '');
                            connIdx++;
                        }

                        // Draw chord name near the root segment
                        var nameAng = voices[0].ang;
                        var nameR = layerR[0] + layerThick + 12;
                        chordArcLabels[chi].setAttribute('x', (cx + nameR * Math.cos(nameAng)).toFixed(2));
                        chordArcLabels[chi].setAttribute('y', (cy + nameR * Math.sin(nameAng)).toFixed(2));
                        chordArcLabels[chi].setAttribute('dy', '0.35em');
                        chordArcLabels[chi].setAttribute('fill', 'rgba(0,0,0,0.45)');
                        chordArcLabels[chi].setAttribute('display', '');
                        chordArcLabels[chi].textContent = displayName(rootName) + (item.chord.name.slice(rm[0].length) || '');

                        // Voice-leading arrows — optimal matching, filled shapes across layers
                        if (prevVoices && vli < MAX_VL_ARROWS) {
                            var assign = vlBestMatch(prevVoices, voices);
                            for (var ci2 = 0; ci2 < voices.length && ci2 < assign.length; ci2++) {
                                if (vli >= MAX_VL_ARROWS) break;
                                var pi2 = assign[ci2];
                                if (pi2 < 0) continue;
                                var from = prevVoices[pi2];
                                var to = voices[ci2];
                                // Skip if same pc AND same layer
                                if (from.pc === to.pc && from.layer === to.layer) continue;
                                var fromR = layerR[from.layer];
                                var toR = layerR[to.layer];

                sequences[activeSequenceIdx].chords[chordIdx] = { chord: picked.chord, typeIdx: picked.typeIdx };
                strumChord(picked.chord);
                _hgSuppressStrum = true;
                rerenderSequence(activeSequenceIdx);
                buildHarmonyGrid();
                setTimeout(function () { _hgSuppressStrum = false; }, 100);
            }, { passive: false });
            row.appendChild(label);

            var cells = document.createElement('div');
            cells.className = 'hg-cells';
            for (var s = 0; s < 24; s++) {
                var cell = document.createElement('div');
                cell.className = 'hg-cell' + (scaleSet.has(s % 12) ? ' in-scale' : '') + (s === 12 ? ' octave-boundary' : '');
                cells.appendChild(cell);
            }
            hgAddNoteLines(cells, scaleSet, tonicIdx);

            // Add chord tone handles
            var chordPositions = []; // track positions for connector line
            for (var i = 0; i < chordIntervals.length; i++) {
                (function (intervalOffset, intervalIdx) {
                    // For intervals >= 12 (e.g. 9th = 14), place in second octave
                    var absSemitone = rootSemitone + intervalOffset;
                    // Wrap into 0-23 range
                    while (absSemitone >= 24) absSemitone -= 12;
                    if (absSemitone < 0) absSemitone += 12;
                    chordPositions.push(absSemitone);
                    var note = NOTES[(tonicIdx + absSemitone) % 12];
                    var handle = document.createElement('div');
                    handle.className = 'hg-handle';
                    handle.style.left = (absSemitone / 24 * 100) + '%';
                    var dot = document.createElement('div');
                    var isRoot = intervalOffset === 0;
                    dot.className = isRoot ? 'hg-chord-dot root' : 'hg-chord-dot';
                    dot.style.background = intervalColorCSS(absSemitone % 12, 0.92);
                    if (isRoot) {
                        hgSetupRootSlider(dot, chordIdx, rootSemitone, chordIntervals, cells);
                    } else {
                        hgSetupChordSlider(dot, chordIdx, rootSemitone, intervalOffset, intervalIdx, cells);
                    }
                    handle.appendChild(dot);
                    cells.appendChild(handle);
                })(chordIntervals[i], i);
            }

            // Pairwise horizontal connector lines between all chord tone pairs
            if (chordPositions.length >= 2) {
                var sortedPos = chordPositions.slice().sort(function (a, b) { return a - b; });
                // Build all pairs
                var pairs = [];
                for (var pi = 0; pi < sortedPos.length; pi++) {
                    for (var pj = pi + 1; pj < sortedPos.length; pj++) {
                        pairs.push([sortedPos[pi], sortedPos[pj]]);
                    }
                }
                // Sort pairs by span width (narrowest first) for greedy layer assignment
                pairs.sort(function (a, b) { return (a[1] - a[0]) - (b[1] - b[0]); });
                // Greedy layer assignment: place each pair on the lowest layer where it doesn't overlap
                var layers = []; // each layer is an array of [start, end] ranges
                var pairLayers = [];
                for (var pk = 0; pk < pairs.length; pk++) {
                    var placed = false;
                    for (var lay = 0; lay < layers.length; lay++) {
                        var overlaps = false;
                        for (var lr = 0; lr < layers[lay].length; lr++) {
                            var existing = layers[lay][lr];
                            if (pairs[pk][0] < existing[1] && pairs[pk][1] > existing[0]) {
                                overlaps = true; break;
                            }
                        }
                        if (!overlaps) {
                            layers[lay].push(pairs[pk]);
                            pairLayers.push(lay);
                            placed = true;
                            break;
                        }
                    }
                    if (!placed) {
                        layers.push([pairs[pk]]);
                        pairLayers.push(layers.length - 1);
                    }
                }
                var numLayers = layers.length;
                for (var pk2 = 0; pk2 < pairs.length; pk2++) {
                    var p1 = pairs[pk2][0], p2 = pairs[pk2][1];
                    var pairInterval = ((p2 - p1) % 12 + 12) % 12;
                    var connector = document.createElement('div');
                    connector.className = 'hg-chord-connector';
                    var leftPct = ((p1 + 0.5) / 24 * 100);
                    var rightPct = ((p2 + 0.5) / 24 * 100);
                    connector.style.left = leftPct + '%';
                    connector.style.width = (rightPct - leftPct) + '%';
                    connector.style.background = intervalColorCSS(pairInterval, 1);
                    connector.style.height = (100 / numLayers) + '%';
                    connector.style.top = (pairLayers[pk2] / numLayers * 100) + '%';
                    connector.dataset.pos1 = p1;
                    connector.dataset.pos2 = p2;
                    cells.appendChild(connector);
                }
            }

            // Mark note lines at chord tone positions — chord-tone lines use note color at full opacity
            var noteLines = cells.querySelectorAll('.hg-note-line');
            for (var cp = 0; cp < chordPositions.length; cp++) {
                var pos = chordPositions[cp];
                var chordNote = NOTES[(tonicIdx + pos) % 12];
                if (noteLines[pos]) {
                    noteLines[pos].classList.add('chord-tone');
                    noteLines[pos].style.background = intervalColorCSS(pos % 12, 1);
                    var cpPct = ((pos + 0.5) / 24 * 100);
                    noteLines[pos].style.left = 'calc(' + cpPct + '% - 4px)';
                }
                var mirror = pos < 12 ? pos + 12 : pos - 12;
                if (noteLines[mirror]) {
                    noteLines[mirror].classList.add('chord-tone');
                    noteLines[mirror].style.background = intervalColorCSS(mirror % 12, 1);
                    var mpPct = ((mirror + 0.5) / 24 * 100);
                    noteLines[mirror].style.left = 'calc(' + mpPct + '% - 4px)';
                }
            }

            // Show ghost dots for diatonic intervals not present in chord
            var chordSet12 = new Set(chordIntervals.map(function (v) { return v % 12; }));
            // Find which scale degree this root is
            var rootDegIdx = currentScaleIntervals.indexOf(rootSemitone % 12);
            if (rootDegIdx >= 0) {
                // Compute diatonic 3rd, 5th, and 7th intervals from the scale
                var diatonicGhostDegrees = [2, 4, 6]; // 3rd, 5th, 7th (0-based offset in scale)
                for (var gi = 0; gi < diatonicGhostDegrees.length; gi++) {
                    (function (degOffset) {
                        var targetDeg = (rootDegIdx + degOffset) % 7;
                        var intervalSemitone = ((currentScaleIntervals[targetDeg] - currentScaleIntervals[rootDegIdx]) % 12 + 12) % 12;
                        if (intervalSemitone === 0) return; // skip root
                        if (chordSet12.has(intervalSemitone)) return; // already present
                        var absSemitone = rootSemitone + intervalSemitone;
                        if (absSemitone >= 24) absSemitone -= 12;
                        var ghostHandle = document.createElement('div');
                        ghostHandle.className = 'hg-handle';
                        ghostHandle.style.left = (absSemitone / 24 * 100) + '%';
                        var ghost = document.createElement('div');
                        ghost.className = 'hg-chord-ghost';
                        ghost.textContent = INTERVAL_NAMES[intervalSemitone] || '';
                        ghost.addEventListener('click', function () {
                            hgToggleChordTone(chordIdx, intervalSemitone);
                        });
                        if (useIntervalColors) ghost.style.borderColor = intervalColorCSS(intervalSemitone, 0.45);
                        ghostHandle.appendChild(ghost);
                        cells.appendChild(ghostHandle);
                    })(diatonicGhostDegrees[gi]);
                }
            }
            // 9th toggle dot — always visible in second octave as ghost; clicking adds/removes interval 14
            var has9th = chordIntervals.indexOf(14) >= 0;
            if (!has9th) {
                // Only show ghost if not already rendered as a filled dot above
                (function () {
                    var ninethAbsSemitone = rootSemitone + 2; // 9th = 2 semitones above root
                    if (ninethAbsSemitone >= 24) ninethAbsSemitone -= 12;
                    // Place in second octave
                    var ninethPos = ninethAbsSemitone + 12;
                    if (ninethPos < 24) {
                        var nineHandle = document.createElement('div');
                        nineHandle.className = 'hg-handle';
                        nineHandle.style.left = (ninethPos / 24 * 100) + '%';
                        var nineGhost = document.createElement('div');
                        nineGhost.className = 'hg-chord-ghost';
                        nineGhost.textContent = '9';
                        nineGhost.addEventListener('click', function () {
                            hgToggleChordTone(chordIdx, 14);
                        });
                        if (useIntervalColors) nineGhost.style.borderColor = intervalColorCSS(2, 0.45);
                        nineHandle.appendChild(nineGhost);
                        cells.appendChild(nineHandle);
                    }
                })();
            }

            row.appendChild(cells);

            // Hover label → strum chord; hover row → just highlight
            label.addEventListener('mouseenter', function () {
                if (!_hgSuppressStrum) strumChord(item.chord);
                hgHighlightRenderedCard(chordIdx, true);
            });
            label.addEventListener('mouseleave', function () {
                hgHighlightRenderedCard(chordIdx, false);
            });

            // Drag to rearrange chord rows
            row.draggable = true;
            row.dataset.chordIdx = chordIdx;
            row.addEventListener('dragstart', function (e) {
                e.dataTransfer.setData('text/plain', 'hg-chord:' + chordIdx);
                e.dataTransfer.effectAllowed = 'move';
                row.classList.add('dragging');
            });
            row.addEventListener('dragend', function () {
                row.classList.remove('dragging');
                grid.querySelectorAll('.drag-over-above, .drag-over-below').forEach(function (el) {
                    el.classList.remove('drag-over-above', 'drag-over-below');
                });
            });
            row.addEventListener('dragover', function (e) {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
                grid.querySelectorAll('.drag-over-above, .drag-over-below').forEach(function (el) {
                    el.classList.remove('drag-over-above', 'drag-over-below');
                });
                var rect = row.getBoundingClientRect();
                if (e.clientY < rect.top + rect.height / 2) {
                    row.classList.add('drag-over-above');
                } else {
                    row.classList.add('drag-over-below');
                }
            });
            row.addEventListener('dragleave', function () {
                row.classList.remove('drag-over-above', 'drag-over-below');
            });
            row.addEventListener('drop', function (e) {
                e.preventDefault();
                var data = e.dataTransfer.getData('text/plain');
                if (!data.startsWith('hg-chord:')) return;
                var srcIdx = parseInt(data.split(':')[1], 10);
                var rect = row.getBoundingClientRect();
                var targetIdx = chordIdx;
                if (e.clientY >= rect.top + rect.height / 2) targetIdx++;
                if (srcIdx === targetIdx || srcIdx + 1 === targetIdx) return; // no-op
                var seq = sequences[activeSequenceIdx];
                var moved = seq.chords.splice(srcIdx, 1)[0];
                if (srcIdx < targetIdx) targetIdx--;
                seq.chords.splice(targetIdx, 0, moved);
                rerenderSequence(activeSequenceIdx);
                buildHarmonyGrid();
            });

            grid.appendChild(row);
        }

        // ── Degree slider drag ──
        function hgSetupDegreeSlider(dot, degIdx, currentSemitone, container) {
            var dragging = false;
            var startX = 0;
            var cellWidth = 0;
            dot.addEventListener('pointerdown', function (e) {
                e.preventDefault();
                e.stopPropagation();
                dot.setPointerCapture(e.pointerId);
                dragging = true;
                startX = e.clientX;
                cellWidth = container.getBoundingClientRect().width / 24;
                dot.classList.add('dragging');
            });
            dot.addEventListener('pointermove', function (e) {
                if (!dragging) return;
                var dx = e.clientX - startX;
                dot.style.transform = 'translateX(' + dx + 'px) translateY(-100%)';
            });
            dot.addEventListener('pointerup', function (e) {
                if (!dragging) return;
                dragging = false;
                dot.classList.remove('dragging');
                var dx = e.clientX - startX;
                var colDelta = Math.round(dx / cellWidth);
                dot.style.transform = 'translateY(-100%)';
                if (colDelta === 0) return;
                var newSemitone = ((currentSemitone + colDelta) % 12 + 12) % 12;
                // Can't be root (0) or overlap another degree
                if (newSemitone === 0) return;
                for (var i = 0; i < currentScaleIntervals.length; i++) {
                    if (i !== degIdx && currentScaleIntervals[i] === newSemitone) return;
                }
                currentScaleIntervals[degIdx] = newSemitone;
                currentScaleIntervals.sort(function (a, b) { return a - b; });
                applyHarmonyToKey();
                rerenderAllSequences();
                buildHarmonyGrid();
            });
            dot.addEventListener('pointercancel', function () {
                dragging = false;
                dot.classList.remove('dragging');
                dot.style.transform = 'translateY(-100%)';
            });
        }

        // ── Root slider drag (snap to nearest scale degree, build diatonic chord) ──
        function hgSetupRootSlider(dot, chordIdx, rootSemitone, chordIntervals, container) {
            var dragging = false;
            var startX = 0;
            var cellWidth = 0;
            dot.addEventListener('pointerdown', function (e) {
                e.preventDefault();
                e.stopPropagation();
                dot.setPointerCapture(e.pointerId);
                dragging = true;
                startX = e.clientX;
                cellWidth = container.getBoundingClientRect().width / 24;
                dot.classList.add('dragging');
            });
            dot.addEventListener('pointermove', function (e) {
                if (!dragging) return;
                // Move all handles visually
                var dx = e.clientX - startX;
                var handles = container.querySelectorAll('.hg-handle');
                for (var i = 0; i < handles.length; i++) {
                    handles[i].style.transform = 'translateX(' + dx + 'px)';
                }
                // Move connectors too
                var conns = container.querySelectorAll('.hg-chord-connector');
                for (var ci = 0; ci < conns.length; ci++) {
                    conns[ci].style.transform = 'translateX(' + dx + 'px)';
                }
            });
            dot.addEventListener('pointerup', function (e) {
                if (!dragging) return;
                dragging = false;
                dot.classList.remove('dragging');
                var dx = e.clientX - startX;
                var colDelta = Math.round(dx / cellWidth);
                var handles = container.querySelectorAll('.hg-handle');
                for (var i = 0; i < handles.length; i++) {
                    handles[i].style.transform = '';
                }
                var conns2 = container.querySelectorAll('.hg-chord-connector');
                for (var ci2 = 0; ci2 < conns2.length; ci2++) {
                    conns2[ci2].style.transform = '';
                }
                if (colDelta === 0) return;
                // Find target semitone and snap to nearest scale degree
                var rawTarget = ((rootSemitone + colDelta) % 24 + 24) % 24;
                var targetDeg = rawTarget % 12;
                // Find nearest scale degree
                var bestDeg = -1, bestDist = 99;
                for (var si = 0; si < currentScaleIntervals.length; si++) {
                    var d = Math.abs(currentScaleIntervals[si] - targetDeg);
                    var dWrap = 12 - d;
                    var dist = Math.min(d, dWrap);
                    if (dist < bestDist) { bestDist = dist; bestDeg = si; }
                }
                if (bestDeg < 0) return;
                var newRootSemitone = currentScaleIntervals[bestDeg];
                if (newRootSemitone === rootSemitone % 12) return; // same degree, no-op
                // Build diatonic chord for the new degree
                var tonicIdx = NOTES.indexOf(harmonyTonic);
                var newRootName = NOTES[(tonicIdx + newRootSemitone) % 12];
                var triad = getDiatonicTriadType(bestDeg);
                // Preserve seventh if original had one
                var oldItem = sequences[activeSequenceIdx].chords[chordIdx];
                var oldIntervals = getChordIntervals(oldItem);
                var hadSeventh = oldIntervals.some(function (v) { return v === 10 || v === 11; });
                var seventh = null;
                if (hadSeventh) {
                    // Compute diatonic seventh for the new degree
                    var seventhDeg = (bestDeg + 6) % 7;
                    seventh = ((currentScaleIntervals[seventhDeg] - newRootSemitone) % 12 + 12) % 12;
                }
                var typeIdx = intervalsToTypeIdx(triad.third, triad.fifth, seventh);
                if (typeIdx < 0) typeIdx = intervalsToTypeIdx(triad.third, triad.fifth, null);
                if (typeIdx < 0) typeIdx = 0;
                var suffix = TYPE_SUFFIXES[typeIdx];
                var newChord = CHORD_DB.find(function (c) { return c.name === newRootName + suffix; });
                if (!newChord) {
                    newChord = CHORD_DB.find(function (c) { return c.name === newRootName; });
                    if (newChord) typeIdx = 0;
                }
                if (!newChord) return;
                sequences[activeSequenceIdx].chords[chordIdx] = { chord: newChord, typeIdx: typeIdx };
                strumChord(newChord);
                _hgSuppressStrum = true;
                rerenderSequence(activeSequenceIdx);
                buildHarmonyGrid();
                setTimeout(function () { _hgSuppressStrum = false; }, 100);
            });
            dot.addEventListener('pointercancel', function () {
                dragging = false;
                dot.classList.remove('dragging');
                var handles = container.querySelectorAll('.hg-handle');
                for (var i = 0; i < handles.length; i++) {
                    handles[i].style.transform = '';
                }
                var conns3 = container.querySelectorAll('.hg-chord-connector');
                for (var ci3 = 0; ci3 < conns3.length; ci3++) {
                    conns3[ci3].style.transform = '';
                }
            });
        }

        // Derive a chord suffix label from a sorted interval array
        function intervalsToSuffix(intervals) {
            for (var ti = 0; ti < TYPE_INTERVALS.length; ti++) {
                if (TYPE_INTERVALS[ti].length === intervals.length) {
                    var ok = true;
                    for (var j = 0; j < intervals.length; j++) {
                        if (TYPE_INTERVALS[ti][j] !== intervals[j]) { ok = false; break; }
                    }
                    if (ok) return TYPE_SUFFIXES[ti];
                }
            }
            // Generate a custom label from intervals
            var hasMajor3 = intervals.indexOf(4) >= 0;
            var hasMinor3 = intervals.indexOf(3) >= 0;
            var hasSus2 = intervals.indexOf(2) >= 0 && !hasMajor3 && !hasMinor3;
            var hasSus4 = intervals.indexOf(5) >= 0 && !hasMajor3 && !hasMinor3;
            var has5 = intervals.indexOf(7) >= 0;
            var hasDim5 = intervals.indexOf(6) >= 0;
            var hasAug5 = intervals.indexOf(8) >= 0;
            var hasMin7 = intervals.indexOf(10) >= 0;
            var hasMaj7 = intervals.indexOf(11) >= 0;
            var has9 = intervals.indexOf(14) >= 0 || (intervals.indexOf(2) >= 0 && !hasSus2);
            var base = hasMajor3 ? '' : (hasMinor3 ? 'm' : (hasSus2 ? 'sus2' : (hasSus4 ? 'sus4' : '')));
            var fifth = hasDim5 ? '\u266d5' : (hasAug5 ? '\u266f5' : '');
            var seventh = hasMin7 ? '7' : (hasMaj7 ? 'maj7' : '');
            var ninth = (intervals.indexOf(14) >= 0 || (has9 && !hasSus2)) ? '/9' : '';
            return base + fifth + seventh + ninth;
        }

        // Get the actual intervals to use for a chord item (custom overrides TYPE_INTERVALS)
        function getChordIntervals(item) {
            if (!item) return [0, 4, 7];
            if (item.intervals) return item.intervals;
            var rm = item.chord && item.chord.name ? item.chord.name.match(/^([A-G]#?)/) : null;
            if (!rm) return [0, 4, 7];
            var typeIdx = TYPE_SUFFIXES.indexOf(item.chord.name.slice(rm[0].length));
            return typeIdx >= 0 ? TYPE_INTERVALS[typeIdx] : [0, 4, 7];
        }

        // ── Chord interval slider drag (3rd, 5th, 7th) ──
        // Click (no drag) toggles the interval off
        function hgSetupChordSlider(dot, chordIdx, rootSemitone, currentInterval, intervalIdx, container) {
            var dragging = false;
            var startX = 0;
            var cellWidth = 0;
            var didMove = false;
            dot.addEventListener('pointerdown', function (e) {
                e.preventDefault();
                e.stopPropagation();
                dot.setPointerCapture(e.pointerId);
                dragging = true;
                didMove = false;
                startX = e.clientX;
                cellWidth = container.getBoundingClientRect().width / 24;
                dot.classList.add('dragging');
            });
            dot.addEventListener('pointermove', function (e) {
                if (!dragging) return;
                var dx = e.clientX - startX;
                if (Math.abs(dx) > 3) didMove = true;
                dot.parentElement.style.transform = 'translateX(' + dx + 'px)';
                // Update pairwise connectors based on dragged handle position
                var conns = container.querySelectorAll('.hg-chord-connector');
                if (conns.length > 0) {
                    var containerWidth = container.getBoundingClientRect().width;
                    var slotW = containerWidth / 24;
                    var dragPos = Math.round(parseFloat(dot.parentElement.style.left) / 100 * 24);
                    for (var ci = 0; ci < conns.length; ci++) {
                        var p1 = parseInt(conns[ci].dataset.pos1);
                        var p2 = parseInt(conns[ci].dataset.pos2);
                        var c1 = (p1 + 0.5) * slotW;
                        var c2 = (p2 + 0.5) * slotW;
                        if (p1 === dragPos) c1 += dx;
                        if (p2 === dragPos) c2 += dx;
                        var minC = Math.min(c1, c2);
                        var maxC = Math.max(c1, c2);
                        conns[ci].style.left = (minC / containerWidth * 100) + '%';
                        conns[ci].style.width = ((maxC - minC) / containerWidth * 100) + '%';
                        // Update interval color based on visual distance
                        var visualSemitones = Math.abs(Math.round((c2 - c1) / slotW));
                        var pairInterval = ((visualSemitones % 12) + 12) % 12;
                        conns[ci].style.background = intervalColorCSS(pairInterval, 1);
                    }
                }
            });
            dot.addEventListener('pointerup', function (e) {
                if (!dragging) return;
                dragging = false;
                dot.classList.remove('dragging');
                var dx = e.clientX - startX;
                var colDelta = Math.round(dx / cellWidth);
                dot.parentElement.style.transform = '';

                // Click (no drag) → toggle this interval off; drag that rounds to 0 cols → do nothing
                if (!didMove) {
                    hgToggleChordTone(chordIdx, currentInterval);
                    return;
                }
                if (colDelta === 0) return;

                var item = sequences[activeSequenceIdx].chords[chordIdx];
                if (!item || !item.chord) return;
                var rm = item.chord.name.match(/^([A-G]#?)/);
                if (!rm) return;
                var rootName = rm[1];
                var oldIntervals = getChordIntervals(item).slice();

                var newInterval = currentInterval + colDelta;
                // Clamp: non-root intervals must stay 1-13
                if (newInterval <= 0 || newInterval > 13) return;
                // Can't overlap another existing interval
                var ii = oldIntervals.indexOf(currentInterval);
                if (ii < 0) return;
                if (oldIntervals.indexOf(newInterval) >= 0 && newInterval !== currentInterval) return;
                oldIntervals[ii] = newInterval;
                oldIntervals.sort(function (a, b) { return a - b; });

                // Try to find an exact TYPE_INTERVALS match first
                var newTypeIdx = -1;
                // Normalise to 12-semitone space for type matching
                var normalised = oldIntervals.map(function (v) { return v % 12; }).sort(function (a, b) { return a - b; });
                for (var ti = 0; ti < TYPE_INTERVALS.length; ti++) {
                    if (TYPE_INTERVALS[ti].length === normalised.length) {
                        var match2 = true;
                        for (var j = 0; j < normalised.length; j++) {
                            if (TYPE_INTERVALS[ti][j] !== normalised[j]) { match2 = false; break; }
                        }
                        if (match2) { newTypeIdx = ti; break; }
                    }
                }

                var newChord = null;
                if (newTypeIdx >= 0) {
                    var newSuffix = TYPE_SUFFIXES[newTypeIdx];
                    newChord = CHORD_DB.find(function (c) { return c.name === rootName + newSuffix; });
                }
                // Fall back: keep chord reference but store custom intervals
                if (!newChord) newChord = CHORD_DB.find(function (c) { return c.name === rootName; }) || item.chord;

                var newItem = { chord: newChord, typeIdx: newTypeIdx >= 0 ? newTypeIdx : item.typeIdx, intervals: oldIntervals };
                // Only drop intervals if the DB chord exactly matches the type (not a fallback chord)
                if (newTypeIdx >= 0 && !oldIntervals.some(function (v) { return v >= 12; })
                    && newChord.name === rootName + TYPE_SUFFIXES[newTypeIdx]
                    && JSON.stringify(TYPE_INTERVALS[newTypeIdx]) === JSON.stringify(normalised)) {
                    delete newItem.intervals;
                }
                sequences[activeSequenceIdx].chords[chordIdx] = newItem;
                if (newChord && newChord.frets) strumChord(newChord);
                _hgSuppressStrum = true;
                rerenderSequence(activeSequenceIdx);
                buildHarmonyGrid();
                setTimeout(function () { _hgSuppressStrum = false; }, 100);
            });
            dot.addEventListener('pointercancel', function () {
                dragging = false;
                dot.classList.remove('dragging');
                dot.parentElement.style.transform = '';
            });
        }

        // ── Seventh toggle ──
        function hgToggleSeventh(chordIdx, seventhInterval) {
            hgToggleChordTone(chordIdx, seventhInterval);
        }

        // ── Toggle a non-root chord tone on/off by click ──
        function hgToggleChordTone(chordIdx, interval) {
            var item = sequences[activeSequenceIdx].chords[chordIdx];
            if (!item || !item.chord) return;
            var rm = item.chord.name.match(/^([A-G]#?)/);
            if (!rm) return;
            var rootName = rm[1];
            var oldIntervals = getChordIntervals(item).slice();

            var ii = oldIntervals.indexOf(interval);
            if (ii > 0) {
                // Remove interval (must keep at least root + one other)
                if (oldIntervals.length <= 2) return;
                oldIntervals.splice(ii, 1);
            } else {
                // Add interval back
                oldIntervals.push(interval);
                oldIntervals.sort(function (a, b) { return a - b; });
            }

            var newTypeIdx = -1;
            var normalised = oldIntervals.map(function (v) { return v % 12; }).sort(function (a, b) { return a - b; });
            for (var ti = 0; ti < TYPE_INTERVALS.length; ti++) {
                if (TYPE_INTERVALS[ti].length === normalised.length) {
                    var match = true;
                    for (var j = 0; j < normalised.length; j++) {
                        if (TYPE_INTERVALS[ti][j] !== normalised[j]) { match = false; break; }
                    }
                    if (match) { newTypeIdx = ti; break; }
                }
            }
            var newChord = null;
            if (newTypeIdx >= 0) {
                newChord = CHORD_DB.find(function (c) { return c.name === rootName + TYPE_SUFFIXES[newTypeIdx]; });
            }
            if (!newChord) newChord = CHORD_DB.find(function (c) { return c.name === rootName; }) || item.chord;
            var newItem = { chord: newChord, typeIdx: newTypeIdx >= 0 ? newTypeIdx : item.typeIdx, intervals: oldIntervals };
            // Only drop intervals if the DB chord exactly matches the type (not a fallback chord)
            if (newTypeIdx >= 0 && !oldIntervals.some(function (v) { return v >= 12; })
                && newChord.name === rootName + TYPE_SUFFIXES[newTypeIdx]
                && JSON.stringify(TYPE_INTERVALS[newTypeIdx]) === JSON.stringify(normalised)) delete newItem.intervals;
            sequences[activeSequenceIdx].chords[chordIdx] = newItem;
            if (newChord && newChord.frets) strumChord(newChord);
            _hgSuppressStrum = true;
            rerenderSequence(activeSequenceIdx);
            buildHarmonyGrid();
            setTimeout(function () { _hgSuppressStrum = false; }, 100);
        }

        // ── Tonic change ──
        function hgChangeTonic(newTonic) {

        // ── Chord creation from picker ──
        function hgAddChord(degreeIdx) {
            var tonicIdx = NOTES.indexOf(harmonyTonic);
            var semitone = currentScaleIntervals[degreeIdx];
            var rootName = NOTES[(tonicIdx + semitone) % 12];

            // Get diatonic triad type
            var triad = getDiatonicTriadType(degreeIdx);
            var typeIdx = intervalsToTypeIdx(triad.third, triad.fifth, null);
            if (typeIdx < 0) typeIdx = 0; // fallback to major

            var suffix = TYPE_SUFFIXES[typeIdx];
            var chord = CHORD_DB.find(function (c) { return c.name === rootName + suffix; });
            if (!chord) {
                // Try major as fallback
                chord = CHORD_DB.find(function (c) { return c.name === rootName; });
                if (chord) typeIdx = 0;
            }
            if (!chord) return;

            var seq = sequences[activeSequenceIdx];
            // Find last null slot
            var insertIdx = -1;
            for (var i = seq.chords.length - 1; i >= 0; i--) {
                if (seq.chords[i] === null) { insertIdx = i; break; }
            }
            if (insertIdx < 0) {
                insertIdx = seq.chords.length;
                seq.chords.push(null);
            }
            seq.chords[insertIdx] = { chord: chord, typeIdx: typeIdx };
            if (!seq.chords.some(function (c) { return c === null; })) {
                seq.chords.push(null);

            buildHarmonyGrid();

        // Check if a root note is diatonic to the current key
        function rootInKey(rootName) {
            if (!selectedKeyNotes) return true;
            if (capo > 0) {
                return selectedKeyNotes.has(NOTES[(NOTES.indexOf(rootName) + capo) % 12]);
            }
            return selectedKeyNotes.has(rootName);

        // Check if a specific chord (root + type) fits the current key
        function chordTypeInKey(root, typeIdx) {
            if (!selectedKeyNotes) return true;
            return chordFitsKey(root, typeIdx, selectedKeyNotes);

        // Check if an individual note (by semitone from root) is in the current key
        function noteInKey(noteName) {

        }

        // Multi-sequence state: each item is { chord, typeIdx } or null (picker slot)
        let sequences = [{ name: 'Sequence 1', chords: [null] }];
        let activeSequenceIdx = 0;

        function getTypesForRoot(root) {
            return TYPE_SUFFIXES.map((s, i) => {
                const chord = CHORD_DB.find(c => c.name === root + s);
                return chord ? { chord, typeIdx: i } : null;
