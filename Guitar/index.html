function segSegDist2(a1, a2, b1, b2) {
  // Squared distance between two line segments a1-a2 and b1-b2
  function ptSeg2(p, s1, s2) {
    const dx = s2.x - s1.x, dy = s2.y - s1.y;
    const l2 = dx * dx + dy * dy;
    if (l2 === 0) { const ex = p.x - s1.x, ey = p.y - s1.y; return ex * ex + ey * ey; }
    const t = Math.max(0, Math.min(1, ((p.x - s1.x) * dx + (p.y - s1.y) * dy) / l2));
    const cx = p.x - (s1.x + t * dx), cy = p.y - (s1.y + t * dy);
    return cx * cx + cy * cy;
  }
  return Math.min(
    ptSeg2(a1, b1, b2), ptSeg2(a2, b1, b2),
    ptSeg2(b1, a1, a2), ptSeg2(b2, a1, a2)
  );
}

function polyPolyDist(polyA, polyB) {
  // Minimum distance between two convex polygons (arrays of {x,y})
  let minD2 = Infinity;
  const nA = polyA.length, nB = polyB.length;
  for (let i = 0; i < nA; i++) {
    const a1 = polyA[i], a2 = polyA[(i + 1) % nA];
    for (let j = 0; j < nB; j++) {
      const b1 = polyB[j], b2 = polyB[(j + 1) % nB];
      minD2 = Math.min(minD2, segSegDist2(a1, a2, b1, b2));
    }
  }
  return Math.sqrt(minD2);
}

function pointInPoly(px, py, poly) {
  let inside = false;
  for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
    const xi = poly[i].x, yi = poly[i].y, xj = poly[j].x, yj = poly[j].y;
    if ((yi > py) !== (yj > py) && px < (xj - xi) * (py - yi) / (yj - yi) + xi) inside = !inside;
  }
  return inside;
}

function layoutSequenceCards(chordsEl) {
  const cards = [...chordsEl.querySelectorAll('.chord-card-wrapper')];
  if (cards.length === 0) {
    chordsEl.style.width = '';
    chordsEl.style.height = '';
    return;
  }
  const S = CARD_SCALE;
  const GAP = CARD_GAP;
  let maxH = 0;
  const infos = cards.map(card => {
    const poly = JSON.parse(card.dataset.polygon).map(p => ({x: p.x * S, y: p.y * S}));
    const w = parseFloat(card.style.width) * S;
    const h = parseFloat(card.style.height || card.querySelector('.chord-card')?.style.height || '0') * S;
    return { poly, w, h };
  });
  const positions = [];
  for (let i = 0; i < cards.length; i++) {
    maxH = Math.max(maxH, infos[i].h);
    if (i === 0) {
      const minX = Math.min(...infos[i].poly.map(p => p.x));
      positions.push(-minX);
    } else {
      const prevPoly = infos[i - 1].poly.map(p => ({x: p.x + positions[i - 1], y: p.y}));
      const currPoly = infos[i].poly;
      let lo = positions[i - 1] + infos[i - 1].w - 300;
      let hi = positions[i - 1] + infos[i - 1].w + 300;
      for (let iter = 0; iter < 60; iter++) {
        const mid = (lo + hi) / 2;
        const shifted = currPoly.map(p => ({x: p.x + mid, y: p.y}));
        const d = polyPolyDist(prevPoly, shifted);
        if (d < GAP) lo = mid; else hi = mid;
      }
      positions.push(hi);
    }
  }
  const TYPE_LIST_SPACE = 210; // vertical space reserved above cards for type list
  for (let i = 0; i < cards.length; i++) {
    cards[i].style.position = 'absolute';
    cards[i].style.left = positions[i] + 'px';
    cards[i].style.top = TYPE_LIST_SPACE + 'px';
    cards[i].style.transform = `scale(${S})`;
    cards[i].style.transformOrigin = 'top left';
  }
  const lastPoly = infos[infos.length - 1].poly;
  const lastMaxX = Math.max(...lastPoly.map(p => p.x));
  const totalW = positions[positions.length - 1] + lastMaxX;
  chordsEl.style.width = totalW + 'px';
  chordsEl.style.height = (TYPE_LIST_SPACE + maxH) + 'px';
}

// ── Mini chord renderer ───────────────────────────────────────
const CHORD_CAM = {x:174, y:185, z:98, lookX:78, lookY:-19, lookZ:4, fov:39};
const MINI_W = 900, MINI_H = 640;
const CHORD_ORTHO_H = 87;
const CHORD_ORTHO_W = CHORD_ORTHO_H * MINI_W / MINI_H;

// Project fretboard 3D bounds to screen-space for tight cropping
function projectFretboardBounds(maxFret) {
  const chordEnd = fretPosition(maxFret) + 10;
  const w0 = boardWidthAt(0) / 2;
  const wE = boardWidthAt(chordEnd) / 2;
  // Fretboard outline corners: [nutHighE, bodyHighE, bodyLowE, nutLowE]
  const outline3D = [
    new THREE.Vector3(-NUT_THICKNESS, 0, -w0),
    new THREE.Vector3(chordEnd, 0, -wE),
    new THREE.Vector3(chordEnd, 0, wE),
    new THREE.Vector3(-NUT_THICKNESS, 0, w0),
  ];
  // All bounding points (including height extremes)
  const points = [
    ...outline3D,
    new THREE.Vector3(0, 0, -w0),
    new THREE.Vector3(0, 0, w0),
    new THREE.Vector3(-NUT_THICKNESS, NUT_HEIGHT + 0.5, -w0),
    new THREE.Vector3(-NUT_THICKNESS, NUT_HEIGHT + 0.5, w0),
    new THREE.Vector3(0, -FRETBOARD_THICKNESS, -w0),
    new THREE.Vector3(0, -FRETBOARD_THICKNESS, w0),
    new THREE.Vector3(chordEnd, -FRETBOARD_THICKNESS, -wE),
    new THREE.Vector3(chordEnd, -FRETBOARD_THICKNESS, wE),
    new THREE.Vector3(chordEnd * 0.5, FRET_WIRE_HEIGHT + 3, stringZ(0, chordEnd * 0.5)),
    new THREE.Vector3(chordEnd * 0.5, FRET_WIRE_HEIGHT + 3, stringZ(5, chordEnd * 0.5)),
  ];
  const cam = new THREE.OrthographicCamera(-CHORD_ORTHO_W, CHORD_ORTHO_W, CHORD_ORTHO_H, -CHORD_ORTHO_H, 0.1, 5000);
  cam.position.set(CHORD_CAM.x, CHORD_CAM.y, CHORD_CAM.z);
  cam.lookAt(CHORD_CAM.lookX, CHORD_CAM.lookY, CHORD_CAM.lookZ);
  cam.updateMatrixWorld();
  let minSX = Infinity, maxSX = -Infinity, minSY = Infinity, maxSY = -Infinity;
  for (const p of points) {
    const v = p.clone().project(cam);
    const sx = (v.x * 0.5 + 0.5) * MINI_W;
    const sy = (-v.y * 0.5 + 0.5) * MINI_H;
    minSX = Math.min(minSX, sx);
    maxSX = Math.max(maxSX, sx);
    minSY = Math.min(minSY, sy);
    maxSY = Math.max(maxSY, sy);
  }
  const pad = 15;
  const cropMinX = Math.max(0, Math.floor(minSX - pad));
  const cropMaxX = Math.min(MINI_W, Math.ceil(maxSX + pad));
  const cropMinY = Math.max(0, Math.floor(minSY - pad));
  const cropMaxY = Math.min(MINI_H, Math.ceil(maxSY + pad));
  // Project outline corners to crop-relative coordinates
  const corners = outline3D.map(p => {
    const v = p.clone().project(cam);
    return {
      x: (v.x * 0.5 + 0.5) * MINI_W - cropMinX,
      y: (-v.y * 0.5 + 0.5) * MINI_H - cropMinY,
    };
  });
  return {
    minX: cropMinX, maxX: cropMaxX,
    minY: cropMinY, maxY: cropMaxY,
    corners, // [nutHighE, bodyHighE, bodyLowE, nutLowE] in crop coords
  };
}

function renderPickerCard(seqIdx, chordIdx) {
  const maxFret = NUM_FRETS;
  const bounds = projectFretboardBounds(maxFret);
  const cropW = bounds.maxX - bounds.minX;
  const cropH = bounds.maxY - bounds.minY;
  const c = bounds.corners;

  const cx = (c[0].x + c[1].x + c[2].x + c[3].x) / 4;
  const cy = (c[0].y + c[1].y + c[2].y + c[3].y) / 4;
  const clipPad = 18;
  const padded = c.map(pt => {
    const dx = pt.x - cx, dy = pt.y - cy;
    const d = Math.sqrt(dx * dx + dy * dy) || 1;
    return { x: pt.x + dx / d * clipPad, y: pt.y + dy / d * clipPad };
  });
  const polyMaxX = Math.max(...padded.map(p => p.x));
  const polyMaxY = Math.max(...padded.map(p => p.y));
  const cardW = Math.max(cropW, Math.ceil(polyMaxX));
  const cardH = Math.max(cropH, Math.ceil(polyMaxY));
  const clipPts = padded.map(p => `${p.x.toFixed(1)}px ${p.y.toFixed(1)}px`).join(', ');

  const card = document.createElement('div');
  card.className = 'chord-card picker-card';
  card.style.width = cardW + 'px';
  card.style.height = cardH + 'px';
  card.style.flexShrink = '0';
  card.dataset.polygon = JSON.stringify(padded.map(p => ({x: p.x, y: p.y})));

  const canvas = document.createElement('canvas');
  canvas.className = 'chord-card-canvas';
  canvas.width = MINI_W * 2;
  canvas.height = MINI_H * 2;
  canvas.style.width = MINI_W + 'px';
  canvas.style.height = MINI_H + 'px';
  canvas.style.left = -bounds.minX + 'px';
  canvas.style.top = -bounds.minY + 'px';
  canvas.style.clipPath = `polygon(${padded.map(p => `${(p.x + bounds.minX).toFixed(1)}px ${(p.y + bounds.minY).toFixed(1)}px`).join(', ')})`;
  card.appendChild(canvas);

  requestAnimationFrame(() => {
    // Render a blank fretboard
    const miniRenderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    miniRenderer.setClearColor(0x000000, 0);
    miniRenderer.setPixelRatio(2);
    miniRenderer.setSize(MINI_W, MINI_H, false);
    card._renderer = miniRenderer;

    const miniScene = new THREE.Scene();
    miniScene.add(new THREE.AmbientLight(0xffffff, 0.7));
    const ml = new THREE.DirectionalLight(0xffffff, 0.6);
    ml.position.set(-50, 200, 100);
    miniScene.add(ml);
    miniScene.add(new THREE.DirectionalLight(0xaabbff, 0.3).translateX(100).translateY(80).translateZ(-50));

    const miniCam = new THREE.OrthographicCamera(-CHORD_ORTHO_W, CHORD_ORTHO_W, CHORD_ORTHO_H, -CHORD_ORTHO_H, 0.1, 5000);
    miniCam.position.set(CHORD_CAM.x, CHORD_CAM.y, CHORD_CAM.z);
    miniCam.lookAt(CHORD_CAM.lookX, CHORD_CAM.lookY, CHORD_CAM.lookZ);

    const chordEnd = fretPosition(maxFret) + 10;
    buildMiniFretboard(miniScene, chordEnd);
    const miniPmrem = new THREE.PMREMGenerator(miniRenderer);
    miniPmrem.compileCubemapShader();
    const miniEnvScene = new THREE.Scene();
    miniEnvScene.background = new THREE.Color(0xf0ece8);
    miniEnvScene.add(new THREE.AmbientLight(0xffffff, 1.5));
    const med1 = new THREE.DirectionalLight(0xffffff, 1.2);
    med1.position.set(1, 2, 1); miniEnvScene.add(med1);
    const med2 = new THREE.DirectionalLight(0xeef4ff, 0.8);
    med2.position.set(-1, 0.5, -1); miniEnvScene.add(med2);
    const miniEnvRT = miniPmrem.fromScene(miniEnvScene, 0, 0.1, 1000);
    const miniEnvMap = miniEnvRT.texture;
    miniPmrem.dispose();
    const fop = getBoardOpacity();
    const miniFretMat = new THREE.MeshStandardMaterial({ color: 0xd0d0d0, roughness: 0.15, metalness: 0.95, envMap: miniEnvMap, envMapIntensity: 1.0, side: THREE.DoubleSide, transparent: fop < 1, opacity: fop });
    buildMiniFretWires(miniScene, maxFret, miniFretMat);
    buildMiniNut(miniScene);

    // Add plain strings (no chord, just open strings) with shadows
    card._baseStrings = [];
    for (let si = 0; si < 6; si++) {
      const strIdx = 5 - si;
      const str = OPEN_STRINGS[strIdx];
      const r = Math.max(str.gauge / 2, 0.15);
      const nutZ = stringZ(strIdx, 0);
      const endZ = stringZ(strIdx, chordEnd);
      const nutY = stringHeightAt(0);
      const endY = stringHeightAt(chordEnd);
      const geo = new THREE.CylinderGeometry(r, r, chordEnd + NUT_THICKNESS, 8, 1);
      geo.rotateZ(Math.PI / 2);
      const mat = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.35, metalness: 0.6, transparent: fop < 1, opacity: fop });
      const m = new THREE.Mesh(geo, mat);
      m.position.set(chordEnd / 2 - NUT_THICKNESS / 2, (nutY + endY) / 2, (nutZ + endZ) / 2);
      miniScene.add(m);
      card._baseStrings.push(m);
      // Shadow
      const sGeo = new THREE.CylinderGeometry(r * 1.8, r * 1.8, chordEnd + NUT_THICKNESS, 4, 1);
      sGeo.rotateZ(Math.PI / 2);
      const sMat = new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.12, depthWrite: false });
      const shadow = new THREE.Mesh(sGeo, sMat);
      shadow.position.set(chordEnd / 2 - NUT_THICKNESS / 2, 0.05, (nutZ + endZ) / 2);
      miniScene.add(shadow);
      card._baseStrings.push(shadow);
    }

    miniRenderer.render(miniScene, miniCam);

    // Store rendering context for hover previews
    card._miniRenderer = miniRenderer;
    card._miniScene = miniScene;
    card._miniCam = miniCam;
    card._bounds = bounds;
    card._chordEnd = chordEnd;
    card._maxFret = maxFret;
    card._previewObjs = [];
    card._previewLabels = [];
    card._previewTypeIdx = 0;
    card._previewRoot = null;
    card._rootLabelInfos = [];

    function showPickerPreview(chord) {
      // Remove old preview
      clearPickerPreview();
      // Hide base strings so only the chord strings show
      if (card._baseStrings) card._baseStrings.forEach(m => { m.visible = false; });
      // Add markers + strings
      buildMiniStrings(miniScene, chord, chordEnd, maxFret);
      buildMiniMarkers(miniScene, chord, maxFret);
      // Track added objects (last added to scene)
      // We know buildMiniStrings and buildMiniMarkers add children - track them
      // Re-render
      miniRenderer.render(miniScene, miniCam);
      // Add note labels with overlap offset
      miniCam.updateMatrixWorld();
      const chordRoot = chord.name.match(/^([A-G]#?)/)?.[1];
      // Find the lowest string that matches root name
      let pRootSi = -1;
      for (let si = 0; si < 6; si++) {
        if (chord.frets[si] !== null) {
          const s = OPEN_STRINGS[5 - si];
          if (noteAtFret(s, chord.frets[si]).name === chordRoot) { pRootSi = si; break; }
        }
      }
      const pInfos = [];
      for (let si = 0; si < 6; si++) {
        const fretVal = chord.frets[si];
        if (fretVal === null) continue;
        const strIdx = 5 - si;
        const str = OPEN_STRINGS[strIdx];
        const note = noteAtFret(str, fretVal);
        const noteHex = oklchToHex(note.name);
        const isRoot = si === pRootSi;
        let worldPos;
        if (fretVal > 0) {
          const x1 = fretPosition(fretVal - 1);
          const x2 = fretPosition(fretVal);
          const x = (x1 + x2) / 2;
          const z = stringZ(strIdx, x);
          const strRadius = Math.max(str.gauge / 2, 0.15);
          worldPos = new THREE.Vector3(x, FRET_WIRE_HEIGHT + strRadius * 2 + 0.3, z);
        } else {
          const nutX = -NUT_THICKNESS / 2;
          const z = stringZ(strIdx, 0);
          const strRadius = Math.max(str.gauge / 2, 0.15);
          worldPos = new THREE.Vector3(nutX, FRET_WIRE_HEIGHT + strRadius * 2 + 0.3, z);
        }
        const v = worldPos.clone().project(miniCam);
        const sx = (v.x * 0.5 + 0.5) * MINI_W - bounds.minX;
        const sy = (-v.y * 0.5 + 0.5) * MINI_H - bounds.minY;
        const dist = miniCam.position.distanceTo(worldPos);
        const baseFontSize = Math.max(14, Math.min(140, 9600 / dist));
        const fontSize = isRoot ? baseFontSize * 1.5 : baseFontSize;
        pInfos.push({ si, strIdx, fretVal, note, noteHex, isRoot, sx, sy, fontSize });
      }
      // Detect same-fret adjacent-string pairs
      const pOffsets = new Map();
      for (let i = 0; i < pInfos.length; i++) {
        for (let j = i + 1; j < pInfos.length; j++) {
          const a = pInfos[i], b = pInfos[j];
          if (a.fretVal === b.fretVal && Math.abs(a.si - b.si) === 1) {
            const spread = Math.max(a.fontSize, b.fontSize) * 0.3;
            if (a.si < b.si) {
              pOffsets.set(a.si, (pOffsets.get(a.si) || 0) - spread);
              pOffsets.set(b.si, (pOffsets.get(b.si) || 0) + spread);
            } else {
              pOffsets.set(b.si, (pOffsets.get(b.si) || 0) - spread);
              pOffsets.set(a.si, (pOffsets.get(a.si) || 0) + spread);
            }
          }
        }
      }
      for (const info of pInfos) {
        const { si, strIdx, note, noteHex, fontSize } = info;
        const sx = info.sx + (pOffsets.get(si) || 0);
        const sy = info.sy;
        const strokeW = Math.max(1.5, fontSize * 0.09);
        const lbl = document.createElement('div');
        lbl.className = 'mini-note-label picker-preview-label';
        lbl.innerHTML = displayName(note.name) + '<sub>' + note.oct + '</sub>';
        const rr = (noteHex >> 16) & 0xff, gg = (noteHex >> 8) & 0xff, bb = noteHex & 0xff;
        const lum2 = (rr * 0.299 + gg * 0.587 + bb * 0.114) / 255;
        const sc = lum2 < 0.45 ? 'rgba(255,255,255,0.85)' : 'rgba(0,0,0,0.7)';
        lbl.style.left = sx + 'px';
        lbl.style.top = sy + 'px';
        lbl.style.fontSize = fontSize + 'px';
        lbl.style.color = `rgb(${rr},${gg},${bb})`;
        lbl.style.webkitTextStroke = strokeW + 'px ' + sc;
        lbl.style.textShadow = '0 2px 4px rgba(0,0,0,0.45)';
        lbl.style.zIndex = strIdx + 10;
        card.appendChild(lbl);
        card._previewLabels.push(lbl);
      }
    }
    card._showPreview = showPickerPreview;

    function clearPickerPreview() {
      // Remove preview labels
      card._previewLabels.forEach(l => l.remove());
      card._previewLabels = [];
      // Remove 3D preview objects (strings + markers added after base scene)
      const baseCount = card._baseChildCount || miniScene.children.length;
      while (miniScene.children.length > baseCount) {
        const obj = miniScene.children[miniScene.children.length - 1];
        if (obj.geometry) obj.geometry.dispose();
        if (obj.material) obj.material.dispose();
        miniScene.remove(obj);
      }
      // Restore base strings visibility
      if (card._baseStrings) card._baseStrings.forEach(m => { m.visible = true; });
      miniRenderer.render(miniScene, miniCam);
    }
    card._clearPreview = clearPickerPreview;
    card._baseChildCount = miniScene.children.length;

    // Add clickable root note labels at chord root positions
    miniCam.updateMatrixWorld();
    // First pass: collect root label info for overlap detection
    const rootInfos = [];
    PICKER_ROOTS.forEach(rootName => {
      if (!AVAILABLE_ROOTS.has(rootName)) return;
      if (!rootInKey(rootName)) return;
      const majorChord = CHORD_DB.find(c => c.name === rootName);
      if (!majorChord) return;
      let rootSi = -1, rootFret = -1;
      for (let si = 0; si < 6; si++) {
        if (majorChord.frets[si] !== null) { rootSi = si; rootFret = majorChord.frets[si]; break; }
      }
      if (rootSi < 0 || rootFret > maxFret) return;

      const strIdx = 5 - rootSi;
      const noteHex = oklchToHex(rootName);
      let worldPos;
      if (rootFret > 0) {
        const x1 = fretPosition(rootFret - 1);
        const x2 = fretPosition(rootFret);
        const x = (x1 + x2) / 2;
        const z = stringZ(strIdx, x);
        worldPos = new THREE.Vector3(x, FRET_WIRE_HEIGHT + 1, z);
      } else {
        const nutX = -NUT_THICKNESS / 2;
        const z = stringZ(strIdx, 0);
        worldPos = new THREE.Vector3(nutX, FRET_WIRE_HEIGHT + 1, z);
      }

      const v = worldPos.clone().project(miniCam);
      const sx = (v.x * 0.5 + 0.5) * MINI_W - bounds.minX;
      const sy = (-v.y * 0.5 + 0.5) * MINI_H - bounds.minY;

      const dist = miniCam.position.distanceTo(worldPos);
      const fontSize = Math.max(14, Math.min(120, 8000 / dist));
      rootInfos.push({ rootName, rootSi, rootFret, strIdx, noteHex, sx, sy, fontSize });
    });

    // Compute anti-overlap offsets for adjacent-string same-fret roots
    const rootOffsets = new Map();
    for (let i = 0; i < rootInfos.length; i++) {
      for (let j = i + 1; j < rootInfos.length; j++) {
        const a = rootInfos[i], b = rootInfos[j];
        if (a.rootFret === b.rootFret && Math.abs(a.rootSi - b.rootSi) === 1) {
          const spread = Math.max(a.fontSize, b.fontSize) * 0.3;
          if (a.rootSi < b.rootSi) {
            rootOffsets.set(i, (rootOffsets.get(i) || 0) - spread);
            rootOffsets.set(j, (rootOffsets.get(j) || 0) + spread);
          } else {
            rootOffsets.set(j, (rootOffsets.get(j) || 0) - spread);
            rootOffsets.set(i, (rootOffsets.get(i) || 0) + spread);
          }
        }
      }
    }

    // Second pass: create labels with offsets, store info for hit testing
    rootInfos.forEach((info, idx) => {
      const { rootName, strIdx, noteHex, fontSize } = info;
      const sx = info.sx + (rootOffsets.get(idx) || 0);
      const sy = info.sy;
      const strokeW = Math.max(1.5, fontSize * 0.09);

      const label = document.createElement('div');
      label.className = 'mini-note-label picker-note-label';
      const str = OPEN_STRINGS[strIdx];
      const rootNote = noteAtFret(str, info.rootFret);
      label.innerHTML = displayName(rootName) + '<sub>' + rootNote.oct + '</sub>';
      const rr = (noteHex >> 16) & 0xff, gg = (noteHex >> 8) & 0xff, bb = noteHex & 0xff;
      const lum = (rr * 0.299 + gg * 0.587 + bb * 0.114) / 255;
      const strokeColor = lum < 0.45 ? 'rgba(255,255,255,0.85)' : 'rgba(0,0,0,0.7)';
      label.style.left = sx + 'px';
      label.style.top = sy + 'px';
      label.style.fontSize = fontSize + 'px';
      label.style.color = `rgb(${rr},${gg},${bb})`;
      label.style.webkitTextStroke = strokeW + 'px ' + strokeColor;
      label.style.textShadow = '0 2px 4px rgba(0,0,0,0.45)';
      label.style.zIndex = strIdx + 10;
      card.appendChild(label);
      card._rootLabelInfos.push({ rootName, el: label, cx: sx, cy: sy, hitRadius: fontSize * 0.6 });
    });
  });

  // Helper: activate a root on the picker
  function activatePickerRoot(rootName) {
    card._previewRoot = rootName;
    const globalTi = card._previewTypeIdx || 0;
    const types = getTypesForRoot(rootName);
    const keyTypes = types.filter(t => chordTypeInKey(rootName, t.typeIdx));
    let match = keyTypes.find(t => t.typeIdx === globalTi);
    if (!match) match = keyTypes[0];
    if (!match) match = types[0];
    if (match) card._previewTypeIdx = match.typeIdx;
    if (match && card._showPreview) {
      card._showPreview(match.chord);
      strumChord(match.chord);
    }
    if (card._updateTypeList) card._updateTypeList(match ? match.typeIdx : globalTi, rootName);
    // Hide the hovered root label (preview shows its own label there)
    for (const li of card._rootLabelInfos) {
      li.el.style.opacity = li.rootName === rootName ? '0' : '1';
    }
  }
  function deactivatePickerRoot() {
    card._previewRoot = null;
    if (card._clearPreview) card._clearPreview();
    for (const li of card._rootLabelInfos) li.el.style.opacity = '1';
  }
  // Find root label under point (polygon-space coords)
  function rootAtPoint(px, py) {
    let best = null, bestDist = Infinity;
    for (const li of card._rootLabelInfos) {
      const dx = px - li.cx, dy = py - li.cy;
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d < li.hitRadius && d < bestDist) { best = li.rootName; bestDist = d; }
    }
    return best;
  }

  // Wrap picker in wrapper for type list and wheel capture
  const pickerWrapper = document.createElement('div');
  pickerWrapper.className = 'chord-card-wrapper picker-wrapper';
  pickerWrapper.style.width = cardW + 'px';
  pickerWrapper.style.height = cardH + 'px';
  pickerWrapper.dataset.polygon = card.dataset.polygon;
  pickerWrapper.appendChild(card);

  // Type list below picker (shows all type labels with interval grids)
  const pickerTypeList = document.createElement('div');
  pickerTypeList.className = 'chord-type-list';
  pickerTypeList.style.opacity = '0';
  TYPE_LABELS.forEach((tl, ti) => {
    pickerTypeList.appendChild(buildTypeRow(tl, ti, ti === 0, null, true));
  });
  pickerWrapper.appendChild(pickerTypeList);

  // Update type list highlight and colors when preview type/root changes
  card._updateTypeList = function(typeIdx, root) {
    pickerTypeList.innerHTML = '';
    TYPE_LABELS.forEach((tl, ti) => {
      const avail = root ? !!CHORD_DB.find(c => c.name === root + TYPE_SUFFIXES[ti]) : true;
      const inKey = root ? chordTypeInKey(root, ti) : true;
      pickerTypeList.appendChild(buildTypeRow(tl, ti, ti === typeIdx, root || null, avail && inKey));
    });
  };

  // Store polygon handler callbacks on wrapper for container-level dispatch
  let _pickerInsidePoly = false;
  pickerWrapper._polyPadded = padded;
  pickerWrapper._polyHandlers = {
    enter() {
      _pickerInsidePoly = true;
      pickerTypeList.style.opacity = '1';
    },
    move(px, py) {
      const root = rootAtPoint(px, py);
      if (root && root !== card._previewRoot) {
        activatePickerRoot(root);
      } else if (!root && card._previewRoot) {
        deactivatePickerRoot();
      }
    },
    leave() {
      _pickerInsidePoly = false;
      if (card._previewRoot) deactivatePickerRoot();
      pickerTypeList.style.opacity = '0';
    },
    wheel(e) {
      e.preventDefault();
      if (!card._previewRoot) return;
      const root = card._previewRoot;
      const types = getTypesForRoot(root).filter(t => chordTypeInKey(root, t.typeIdx));
      if (types.length === 0) return;
      const curTi = card._previewTypeIdx || 0;
      const curIdx = types.findIndex(t => t.typeIdx === curTi);
      const dir = e.deltaY > 0 ? 1 : -1;
      const startIdx = curIdx >= 0 ? curIdx : 0;
      const newIdx = (startIdx + dir + types.length) % types.length;
      card._previewTypeIdx = types[newIdx].typeIdx;
      if (card._updateTypeList) card._updateTypeList(card._previewTypeIdx, root);
      pickerTypeList.style.opacity = '1';
      if (card._showPreview) {
        card._showPreview(types[newIdx].chord);
        strumChord(types[newIdx].chord);
      }
    },
    click(e) {
      if (!card._previewRoot) return;
      const root = card._previewRoot;
      const types = getTypesForRoot(root).filter(t => chordTypeInKey(root, t.typeIdx));
      const globalTi = card._previewTypeIdx || 0;
      let picked = types.find(t => t.typeIdx === globalTi);
      if (!picked) picked = types[0];
      if (!picked) return;
      strumChord(picked.chord);
      sequences[seqIdx].chords[chordIdx] = { chord: picked.chord, typeIdx: picked.typeIdx };
      if (chordIdx === sequences[seqIdx].chords.length - 1) {
        sequences[seqIdx].chords.push(null);
      }
      rerenderSequence(seqIdx);
    }
  };

  return pickerWrapper;
}

// Track cards where scroll-to-change-type just happened (suppress re-strum)
const _suppressStrum = new Set();

function renderChordCard(chord, seqIdx, chordIdx) {
  // Use at least NUM_FRETS so cards are consistent, but allow more if chord needs it
  let maxFret = 0;
  for (const f of chord.frets) if (f !== null && f > maxFret) maxFret = f;
  if (maxFret === 0) maxFret = 1;
  const layoutFrets = Math.max(maxFret, NUM_FRETS);
  const bounds = projectFretboardBounds(layoutFrets);
  const cropW = bounds.maxX - bounds.minX;
  const cropH = bounds.maxY - bounds.minY;
  const c = bounds.corners; // [nutHighE, bodyHighE, bodyLowE, nutLowE]

  // Compute clip-path polygon (padded parallelogram)
  const cx = (c[0].x + c[1].x + c[2].x + c[3].x) / 4;
  const cy = (c[0].y + c[1].y + c[2].y + c[3].y) / 4;
  const clipPad = 18;
  const padded = c.map(pt => {
    const dx = pt.x - cx, dy = pt.y - cy;
    const d = Math.sqrt(dx * dx + dy * dy) || 1;
    return { x: pt.x + dx / d * clipPad, y: pt.y + dy / d * clipPad };
  });
  // Expand card dimensions to fully contain the padded polygon
  const polyMaxX = Math.max(...padded.map(p => p.x));
  const polyMaxY = Math.max(...padded.map(p => p.y));
  const polyMinX = Math.min(...padded.map(p => p.x));
  const polyMinY = Math.min(...padded.map(p => p.y));
  const cardW = Math.max(cropW, Math.ceil(polyMaxX));
  const cardH = Math.max(cropH, Math.ceil(polyMaxY));
  const clipPts = padded.map(p => `${p.x.toFixed(1)}px ${p.y.toFixed(1)}px`).join(', ');

  const card = document.createElement('div');
  card.className = 'chord-card';
  card.dataset.chordName = chord.name;
  card.draggable = true;
  card.style.width = cardW + 'px';
  card.style.height = cardH + 'px';
  card.style.flexShrink = '0';
  // Store full polygon for Euclidean gap layout
  card.dataset.polygon = JSON.stringify(padded.map(p => ({x: p.x, y: p.y})));

  // Drag events
  card.addEventListener('dragstart', (e) => {
    card.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    // Store sequence index and card index within that sequence
    const container = card.closest('.sequence-chords');
    const seqEl = card.closest('.sequence');
    const si = seqEl ? parseInt(seqEl.dataset.seqIdx, 10) : -1;
    const ci = container ? [...container.children].indexOf(card.closest('.chord-card-wrapper') || card) : -1;
    e.dataTransfer.setData('text/plain', si + ':' + ci);
  });
  card.addEventListener('dragend', () => {
    card.classList.remove('dragging');
    clearAllDropIndicators();
  });

  const canvas = document.createElement('canvas');
  canvas.className = 'chord-card-canvas';
  canvas.width = MINI_W * 2;
  canvas.height = MINI_H * 2;
  canvas.style.width = MINI_W + 'px';
  canvas.style.height = MINI_H + 'px';
  canvas.style.left = -bounds.minX + 'px';
  canvas.style.top = -bounds.minY + 'px';
  canvas.style.clipPath = `polygon(${padded.map(p => `${(p.x + bounds.minX).toFixed(1)}px ${(p.y + bounds.minY).toFixed(1)}px`).join(', ')})`;
  card.appendChild(canvas);

  // Wrapper: card + name + type list below, outside clip-path
  const wrapper = document.createElement('div');
  wrapper.className = 'chord-card-wrapper';
  wrapper.style.width = cardW + 'px';
  wrapper.style.height = cardH + 'px';
  wrapper.dataset.polygon = card.dataset.polygon;
  wrapper.appendChild(card);

  // Store polygon handler callbacks on wrapper for container-level dispatch
  const suppressKey = seqIdx + ':' + chordIdx;
  let _insidePoly = _suppressStrum.has(suppressKey);
  _suppressStrum.delete(suppressKey);
  wrapper._polyPadded = padded;
  wrapper._polyHandlers = {
    enter() {
      if (_insidePoly) return; // already inside (suppress strum on re-render)
      _insidePoly = true;
      strumChord(chord);
      const tl = wrapper.querySelector('.chord-type-list');
      if (tl) tl.style.opacity = '1';
    },
    move(px, py) {},
    leave() {
      _insidePoly = false;
      const tl = wrapper.querySelector('.chord-type-list');
      if (tl) tl.style.opacity = '0';
    },
    wheel(e) {
      e.preventDefault();
      const item = sequences[seqIdx].chords[chordIdx];
      if (!item || !item.chord) return;
      const root = item.chord.name.match(/^([A-G]#?)/)[1];
      const types = getTypesForRoot(root).filter(t => chordTypeInKey(root, t.typeIdx));
      if (types.length <= 1) return;
      const curIdx = types.findIndex(t => t.typeIdx === item.typeIdx);
      const dir = e.deltaY > 0 ? 1 : -1;
      const newIdx = (curIdx + dir + types.length) % types.length;
      strumChord(types[newIdx].chord);
      sequences[seqIdx].chords[chordIdx] = { chord: types[newIdx].chord, typeIdx: types[newIdx].typeIdx };
      _suppressStrum.add(seqIdx + ':' + chordIdx);
      rerenderSequence(seqIdx);
    },
    click(e) {
      sequences[seqIdx].chords.splice(chordIdx, 1);
      if (sequences[seqIdx].chords.length === 0 || !sequences[seqIdx].chords.some(c => c === null)) {
        sequences[seqIdx].chords.push(null);
      }
      rerenderSequence(seqIdx);
    }
  };

  const nameEl = document.createElement('div');
  nameEl.className = 'chord-card-name';
  const rootMatch = chord.name.match(/^([A-G]#?)(.*)$/);
  if (rootMatch && rootMatch[2]) {
    nameEl.innerHTML = displayName(rootMatch[1]) + '<span class="chord-suffix">' + rootMatch[2] + '</span>';
  } else {
    nameEl.textContent = displayName(chord.name);
  }
  wrapper.appendChild(nameEl);

  const rootMatch2 = chord.name.match(/^([A-G]#?)/);
  if (rootMatch2) {
    const root = rootMatch2[1];
    const availableTypes = new Set(getTypesForRoot(root).map(t => t.typeIdx));
    const listEl = document.createElement('div');
    listEl.className = 'chord-type-list';
    const suffix = chord.name.slice(root.length);
    const curTypeIdx = TYPE_SUFFIXES.indexOf(suffix);
    TYPE_LABELS.forEach((tl, ti) => {
      const inKey = chordTypeInKey(root, ti);
      listEl.appendChild(buildTypeRow(tl, ti, ti === curTypeIdx, root, availableTypes.has(ti) && inKey));
    });
    wrapper.appendChild(listEl);
    if (_insidePoly) listEl.style.opacity = '1';
  }

  requestAnimationFrame(() => renderChordMiniScene(chord, canvas, card, bounds, seqIdx, chordIdx));
  return wrapper;
}

function renderChordMiniScene(chord, canvas, card, bounds, seqIdx, chordIdx) {
  const miniRenderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  miniRenderer.setClearColor(0x000000, 0);
  miniRenderer.setPixelRatio(2);
  miniRenderer.setSize(MINI_W, MINI_H, false);
  card._renderer = miniRenderer;

  const miniScene = new THREE.Scene();

  miniScene.add(new THREE.AmbientLight(0xffffff, 0.7));
  const ml = new THREE.DirectionalLight(0xffffff, 0.6);
  ml.position.set(-50, 200, 100);
  miniScene.add(ml);
  miniScene.add(new THREE.DirectionalLight(0xaabbff, 0.3).translateX(100).translateY(80).translateZ(-50));

  const miniCam = new THREE.OrthographicCamera(-CHORD_ORTHO_W, CHORD_ORTHO_W, CHORD_ORTHO_H, -CHORD_ORTHO_H, 0.1, 5000);
  miniCam.position.set(CHORD_CAM.x, CHORD_CAM.y, CHORD_CAM.z);
  miniCam.lookAt(CHORD_CAM.lookX, CHORD_CAM.lookY, CHORD_CAM.lookZ);

  let maxFret = 0;
  for (const f of chord.frets) {
    if (f !== null && f > maxFret) maxFret = f;
  }
  if (maxFret === 0) maxFret = 1;
  const chordEnd = fretPosition(maxFret) + 10;

  buildMiniFretboard(miniScene, chordEnd);
  // Create envMap for this renderer so metallic frets render properly
  const miniPmrem = new THREE.PMREMGenerator(miniRenderer);
  miniPmrem.compileCubemapShader();
  const miniEnvScene = new THREE.Scene();
  miniEnvScene.background = new THREE.Color(0xf0ece8);
  miniEnvScene.add(new THREE.AmbientLight(0xffffff, 1.5));
  const med1 = new THREE.DirectionalLight(0xffffff, 1.2);
  med1.position.set(1, 2, 1); miniEnvScene.add(med1);
  const med2 = new THREE.DirectionalLight(0xeef4ff, 0.8);
  med2.position.set(-1, 0.5, -1); miniEnvScene.add(med2);
  const miniEnvRT = miniPmrem.fromScene(miniEnvScene, 0, 0.1, 1000);
  const miniEnvMap = miniEnvRT.texture;
  miniPmrem.dispose();
  const fop = getBoardOpacity();
  const miniFretMat = new THREE.MeshStandardMaterial({ color: 0xd0d0d0, roughness: 0.15, metalness: 0.95, envMap: miniEnvMap, envMapIntensity: 1.0, side: THREE.DoubleSide, transparent: fop < 1, opacity: fop });
  buildMiniFretWires(miniScene, maxFret, miniFretMat);
  buildMiniNut(miniScene);
  buildMiniStrings(miniScene, chord, chordEnd, maxFret);
  buildMiniMarkers(miniScene, chord, maxFret);

  miniRenderer.render(miniScene, miniCam);

  // Add note labels as HTML overlays
  const chordRoot = chord.name.match(/^([A-G]#?)/)?.[1];
  miniCam.updateMatrixWorld();

  // Find the lowest string (bass) that is played — that's the true root
  let rootSi = -1;
  for (let si = 0; si < 6; si++) {
    if (chord.frets[si] !== null) {
      const str = OPEN_STRINGS[5 - si];
      if (noteAtFret(str, chord.frets[si]).name === chordRoot) { rootSi = si; break; }
    }
  }

  // First pass: collect label info
  const labelInfos = [];
  for (let si = 0; si < 6; si++) {
    const fretVal = chord.frets[si];
    if (fretVal === null) continue;
    const strIdx = 5 - si;
    const str = OPEN_STRINGS[strIdx];
    const note = noteAtFret(str, fretVal);
    const noteHex = oklchToHex(note.name);
    const isRoot = si === rootSi;

    let worldPos;
    if (fretVal > 0) {
      const x1 = fretPosition(fretVal - 1);
      const x2 = fretPosition(fretVal);
      const x = (x1 + x2) / 2;
      const z = stringZ(strIdx, x);
      const strRadius = Math.max(str.gauge / 2, 0.15);
      worldPos = new THREE.Vector3(x, FRET_WIRE_HEIGHT + strRadius * 2 + 0.3, z);
    } else {
      const nutX = -NUT_THICKNESS / 2;
      const z = stringZ(strIdx, 0);
      const strRadius = Math.max(str.gauge / 2, 0.15);
      worldPos = new THREE.Vector3(nutX, FRET_WIRE_HEIGHT + strRadius * 2 + 0.3, z);
    }

    const v = worldPos.clone().project(miniCam);
    const sx = (v.x * 0.5 + 0.5) * MINI_W - bounds.minX;
    const sy = (-v.y * 0.5 + 0.5) * MINI_H - bounds.minY;

    const dist = miniCam.position.distanceTo(worldPos);
    const baseFontSize = Math.max(14, Math.min(140, 9600 / dist));
    const fontSize = isRoot ? baseFontSize * 1.5 : baseFontSize;

    labelInfos.push({ si, strIdx, fretVal, note, noteHex, isRoot, sx, sy, fontSize });
  }

  // Detect same-fret adjacent-string pairs and compute X offsets
  const offsets = new Map(); // si → x offset in px
  for (let i = 0; i < labelInfos.length; i++) {
    for (let j = i + 1; j < labelInfos.length; j++) {
      const a = labelInfos[i], b = labelInfos[j];
      if (a.fretVal === b.fretVal && Math.abs(a.si - b.si) === 1) {
        const spread = Math.max(a.fontSize, b.fontSize) * 0.3;
        // Lower si = lower string (bass) → shift toward lower fret (left)
        // Higher si = higher string (treble) → shift toward higher fret (right)
        if (a.si < b.si) {
          offsets.set(a.si, (offsets.get(a.si) || 0) - spread);
          offsets.set(b.si, (offsets.get(b.si) || 0) + spread);
        } else {
          offsets.set(b.si, (offsets.get(b.si) || 0) - spread);
          offsets.set(a.si, (offsets.get(a.si) || 0) + spread);
        }
      }
    }
  }

  // Second pass: create label elements
  for (const info of labelInfos) {
    const { si, strIdx, note, noteHex, isRoot, fontSize } = info;
    const sx = info.sx + (offsets.get(si) || 0);
    const sy = info.sy;
    const strokeW = Math.max(1.5, fontSize * 0.09);

    const label = document.createElement('div');
    label.className = 'mini-note-label';
    label.innerHTML = displayName(note.name) + '<sub>' + note.oct + '</sub>';
    const r = (noteHex >> 16) & 0xff, g = (noteHex >> 8) & 0xff, b = noteHex & 0xff;
    const lum = (r * 0.299 + g * 0.587 + b * 0.114) / 255;
    const strokeColor = lum < 0.45 ? 'rgba(255,255,255,0.85)' : 'rgba(0,0,0,0.7)';
    label.style.left = sx + 'px';
    label.style.top = sy + 'px';
    label.style.fontSize = fontSize + 'px';
    label.style.color = `rgb(${r},${g},${b})`;
    label.style.webkitTextStroke = strokeW + 'px ' + strokeColor;
    label.style.textShadow = '0 2px 4px rgba(0,0,0,0.45)';
    label.style.zIndex = strIdx + 10;
    if (isRoot) {
      label.style.pointerEvents = 'auto';
      label.style.cursor = 'pointer';
      label.addEventListener('click', (e) => {
        e.stopPropagation();
        sequences[seqIdx].chords.splice(chordIdx, 1);
        if (sequences[seqIdx].chords.length === 0 || !sequences[seqIdx].chords.some(c => c === null)) {
          sequences[seqIdx].chords.push(null);
        }
        rerenderSequence(seqIdx);
      });
    }
    card.appendChild(label);
  }
}

function buildMiniFretboard(scene, end) {
  const steps = 30;
  const verts = [], idx = [], uvs = [];
  for (let i = 0; i <= steps; i++) {
    const t = i / steps, x = t * end, w = boardWidthAt(x) / 2;
    verts.push(x, 0, -w, x, 0, w);
    uvs.push(t, 0, t, 1);
    if (i < steps) { const a = i * 2; idx.push(a, a+1, a+2, a+1, a+3, a+2); }
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
  geo.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
  geo.setIndex(idx);
  geo.computeVertexNormals();
  const op = getBoardOpacity();
  const mat = new THREE.MeshStandardMaterial({
    color: 0xffffff, roughness: 0.75, metalness: 0.03, map: woodTex,
    side: THREE.DoubleSide, transparent: op < 1, opacity: op,
  });
  scene.add(new THREE.Mesh(geo, mat));
}

function buildMiniFretWires(scene, maxFret, fretMat) {
  for (let i = 1; i <= maxFret; i++) {
    const x = fretPosition(i);
    const w = boardWidthAt(x);
    const halfW = FRET_WIRE_WIDTH / 2;
    const fretH = FRET_WIRE_HEIGHT;
    const shape = new THREE.Shape();
    const segs = 24;
    shape.moveTo(halfW, 0);
    for (let s = 0; s <= segs; s++) {
      const a = (s / segs) * Math.PI;
      shape.lineTo(Math.cos(a) * halfW, Math.sin(a) * fretH);
    }
    shape.lineTo(halfW, 0);
    const geo = new THREE.ExtrudeGeometry(shape, { depth: w + 0.1, bevelEnabled: false });
    const m = new THREE.Mesh(geo, fretMat);
    m.position.set(x, 0, -(w + 0.1) / 2);
    scene.add(m);
  }
}

function buildMiniNut(scene) {
  const w = boardWidthAt(0);
  const geo = new THREE.BoxGeometry(NUT_THICKNESS, NUT_HEIGHT + 1, w);
  const nop = getBoardOpacity();
  const mat = new THREE.MeshStandardMaterial({ color: 0xf5f0e0, roughness: 0.4, metalness: 0.05, side: THREE.DoubleSide, transparent: nop < 1, opacity: nop });
  const m = new THREE.Mesh(geo, mat);
  m.position.set(-NUT_THICKNESS / 2, NUT_HEIGHT / 2 - 0.5, 0);
  scene.add(m);
}

function buildMiniStrings(scene, chord, end, maxFret) {
  for (let si = 0; si < 6; si++) {
    const strIdx = 5 - si; // chord.frets[0]=lowE → OPEN_STRINGS[5]=lowE
    const str = OPEN_STRINGS[strIdx];
    const r = Math.max(str.gauge / 2, 0.15);
    const fretVal = chord.frets[si];
    const isPlayed = fretVal !== null;

    let noteHex;
    if (isPlayed) {
      const note = noteAtFret(str, fretVal);
      noteHex = oklchToHex(note.name);
    } else {
      noteHex = 0xffffff;
    }

    const pressFretX = (fretVal && fretVal > 0) ? fretPosition(fretVal) : null;
    const fretTopY = FRET_WIRE_HEIGHT + r;
    const nutY = STRING_HEIGHT_AT_NUT + FRET_WIRE_HEIGHT + r;

    function strY(x) {
      if (pressFretX !== null) {
        if (x <= pressFretX) {
          return nutY + (fretTopY - nutY) * (pressFretX > 0 ? x / pressFretX : 0);
        } else {
          const tSeg = (x - pressFretX) / (end - pressFretX);
          return fretTopY + ((stringHeightAt(end) + FRET_WIRE_HEIGHT) - fretTopY) * tSeg;
        }
      }
      return stringHeightAt(x) + FRET_WIRE_HEIGHT;
    }

    function makeMiniSegment(xStart, xEnd, color, opacity) {
      const numPts = 30;
      const pts = [];
      for (let s = 0; s <= numPts; s++) {
        const t = s / numPts;
        const x = xStart + t * (xEnd - xStart);
        pts.push(new THREE.Vector3(x, strY(x), stringZ(strIdx, x)));
      }
      const curve = new THREE.CatmullRomCurve3(pts);
      curve.curveType = 'catmullrom'; curve.tension = 1;
      const geo = new THREE.TubeGeometry(curve, numPts, r, 8, false);
      const mat = new THREE.MeshBasicMaterial({
        color,
        transparent: opacity < 1,
        opacity,
        depthWrite: opacity >= 1,
      });
      scene.add(new THREE.Mesh(geo, mat));

      // Shadow on fretboard
      const shadowPts = [];
      for (let s = 0; s <= numPts; s++) {
        const t = s / numPts;
        const x = xStart + t * (xEnd - xStart);
        shadowPts.push(new THREE.Vector3(x, 0.05, stringZ(strIdx, x)));
      }
      const shadowCurve = new THREE.CatmullRomCurve3(shadowPts);
      shadowCurve.curveType = 'catmullrom'; shadowCurve.tension = 1;
      const shadowGeo = new THREE.TubeGeometry(shadowCurve, numPts, r * 1.8, 4, false);
      const shadowMat = new THREE.MeshBasicMaterial({
        color: 0x000000, transparent: true, opacity: 0.12, depthWrite: false
      });
      scene.add(new THREE.Mesh(shadowGeo, shadowMat));
    }

    if (!isPlayed) {
      // Muted string: white, full opacity
      makeMiniSegment(0, end, 0xffffff, 1.0);
    } else if (pressFretX !== null && pressFretX > 0.1) {
      // Fretted: muted portion (nut→fret) + active portion (fret→end)
      makeMiniSegment(0, pressFretX, noteHex, 0.3);
      makeMiniSegment(pressFretX, end, noteHex, 1.0);
    } else {
      // Open string: entire string active
      makeMiniSegment(0, end, noteHex, 1.0);
    }
  }
}

function buildMiniMarkers(scene, chord, maxFret) {
  const firstGap = fretPosition(1) - fretPosition(0);
  const markerDiamX = firstGap * 2 / 3;
  const midX = firstGap / 2;
  const bw = boardWidthAt(midX);
  const stringSpacing = (bw - 2 * STRING_PAD) / 5;
  const markerDiamZ = stringSpacing * 1.3;

  const entries = [];
  for (let si = 0; si < 6; si++) {
    const fretVal = chord.frets[si];
    if (fretVal !== null && fretVal > 0) entries.push({ si, fret: fretVal });
  }
  // Sort by mapped OPEN_STRINGS index so deeper strings (closer to camera) draw last
  entries.sort((a, b) => b.si - a.si);

  for (const { si, fret } of entries) {
    const strIdx = 5 - si; // chord.frets[0]=lowE → OPEN_STRINGS[5]=lowE
    const x1 = fretPosition(fret - 1);
    const x2 = fretPosition(fret);
    const x = (x1 + x2) / 2;
    const z = stringZ(strIdx, x);
    const str = OPEN_STRINGS[strIdx];
    const strRadius = Math.max(str.gauge / 2, 0.15);
    const note = noteAtFret(str, fret);
    const noteHex = oklchToHex(note.name);

    const geo = new THREE.CircleGeometry(1, 32);
    const mat = new THREE.MeshBasicMaterial({ color: noteHex, side: THREE.DoubleSide });
    const ellipse = new THREE.Mesh(geo, mat);
    ellipse.renderOrder = strIdx + 1;
    ellipse.rotation.x = -Math.PI / 2;
    ellipse.scale.set(markerDiamX / 2, markerDiamZ / 2, 1);
    const stringTopY = FRET_WIRE_HEIGHT + strRadius * 2;
    ellipse.position.set(x, stringTopY + 0.15, z);
    scene.add(ellipse);
  }
}

// ── Sequence management ───────────────────────────────────────
function addChordToSequence(chord, seqIdx) {
  const seq = sequences[seqIdx];
  if (!seq) return;
  // Insert before the last null (picker slot)
  const lastNull = seq.chords.lastIndexOf(null);
  if (lastNull >= 0) {
    seq.chords.splice(lastNull, 0, { chord, typeIdx: 0 });
  } else {
    seq.chords.push({ chord, typeIdx: 0 });
  }
  rerenderSequence(seqIdx);
}

function clearAllDropIndicators() {
  document.querySelectorAll('.chord-card.drag-target-left, .chord-card.drag-target-right').forEach(el => {
    el.classList.remove('drag-target-left', 'drag-target-right');
  });
  document.querySelectorAll('.sequence-chords.drag-over').forEach(el => {
    el.classList.remove('drag-over');
  });
}

function setupSequenceDragDrop(chordsEl, seqIdx) {
  chordsEl.addEventListener('dragover', (e) => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    clearAllDropIndicators();
    const cards = [...chordsEl.querySelectorAll('.chord-card:not(.dragging)')];
    if (cards.length === 0) {
      chordsEl.classList.add('drag-over');
      return;
    }
    // Find closest card to insert before/after
    let closest = null, closestDist = Infinity, side = 'left';
    for (const c of cards) {
      const rect = c.getBoundingClientRect();
      const midX = rect.left + rect.width / 2;
      const dist = Math.abs(e.clientX - midX);
      if (dist < closestDist) {
        closestDist = dist;
        closest = c;
        side = e.clientX < midX ? 'left' : 'right';
      }
    }
    if (closest) closest.classList.add(side === 'left' ? 'drag-target-left' : 'drag-target-right');
  });

  chordsEl.addEventListener('dragleave', (e) => {
    if (!chordsEl.contains(e.relatedTarget)) {
      clearAllDropIndicators();
    }
  });

  chordsEl.addEventListener('drop', (e) => {
    e.preventDefault();
    clearAllDropIndicators();
    const data = e.dataTransfer.getData('text/plain');
    const [srcSeqIdxStr, srcChordIdxStr] = data.split(':');
    const srcSeqIdx = parseInt(srcSeqIdxStr, 10);
    const srcChordIdx = parseInt(srcChordIdxStr, 10);
    if (isNaN(srcSeqIdx) || isNaN(srcChordIdx)) return;
    if (!sequences[srcSeqIdx] || !sequences[srcSeqIdx].chords[srcChordIdx]) return;

    const [movedChord] = sequences[srcSeqIdx].chords.splice(srcChordIdx, 1);

    // Find insertion index in target sequence
    const cards = [...chordsEl.querySelectorAll('.chord-card:not(.dragging)')];
    let insertIdx = sequences[seqIdx].chords.length;
    for (let i = 0; i < cards.length; i++) {
      const rect = cards[i].getBoundingClientRect();
      if (e.clientX < rect.left + rect.width / 2) {
        insertIdx = i;
        break;
      }
    }

    sequences[seqIdx].chords.splice(insertIdx, 0, movedChord);
    if (srcSeqIdx === seqIdx) {
      rerenderSequence(seqIdx);
    } else {
      rerenderSequence(srcSeqIdx);
      rerenderSequence(seqIdx);
    }
  });
}

function renderSequence(seqIdx) {
  const seq = sequences[seqIdx];
  const el = document.createElement('div');
  el.className = 'sequence' + (seqIdx === activeSequenceIdx ? ' active' : '');
  el.dataset.seqIdx = seqIdx;

  const header = document.createElement('div');
  header.className = 'sequence-header';

  const nameInput = document.createElement('input');
  nameInput.className = 'sequence-name';
  nameInput.type = 'text';
  nameInput.value = seq.name;
  nameInput.addEventListener('input', () => { seq.name = nameInput.value; });
  header.appendChild(nameInput);

  if (sequences.length > 1) {
    const delBtn = document.createElement('button');
    delBtn.className = 'sequence-delete';
    delBtn.textContent = '✕';
    delBtn.addEventListener('click', () => {
      sequences.splice(seqIdx, 1);
      if (activeSequenceIdx >= sequences.length) activeSequenceIdx = sequences.length - 1;
      rerenderAllSequences();
    });
    header.appendChild(delBtn);
  }

  el.appendChild(header);

  const chordsEl = document.createElement('div');
  chordsEl.className = 'sequence-chords';
  seq.chords.forEach((item, idx) => {
    if (item === null) {
      const pickerCard = renderPickerCard(seqIdx, idx);
      chordsEl.appendChild(pickerCard);
    } else {
      const card = renderChordCard(item.chord, seqIdx, idx);
      chordsEl.appendChild(card);
    }
  });
  setupSequenceDragDrop(chordsEl, seqIdx);
  el.appendChild(chordsEl);
  // Layout must happen synchronously so hover polygons are correct immediately
  // (rAF delays cause a frame where getBoundingClientRect is wrong)
  requestAnimationFrame(() => layoutSequenceCards(chordsEl));

  // Container-level polygon dispatch: find which wrapper the mouse is truly inside
  let _activeWrapper = null;
  function findWrapperAtEvent(e) {
    const wrappers = [...chordsEl.querySelectorAll('.chord-card-wrapper')];
    for (const w of wrappers) {
      if (!w._polyPadded || !w._polyHandlers) continue;
      const rect = w.getBoundingClientRect();
      const S = CARD_SCALE;
      const px = (e.clientX - rect.left) / S;
      const py = (e.clientY - rect.top) / S;
      if (pointInPoly(px, py, w._polyPadded)) return { wrapper: w, px, py };
    }
    return null;
  }
  chordsEl.addEventListener('mousemove', (e) => {
    const hit = findWrapperAtEvent(e);
    const hitW = hit ? hit.wrapper : null;
    if (hitW !== _activeWrapper) {
      if (_activeWrapper && _activeWrapper._polyHandlers) _activeWrapper._polyHandlers.leave();
      _activeWrapper = hitW;
      if (_activeWrapper && _activeWrapper._polyHandlers) _activeWrapper._polyHandlers.enter();
    }
    if (hitW && hitW._polyHandlers) hitW._polyHandlers.move(hit.px, hit.py);
  });
  chordsEl.addEventListener('mouseleave', () => {
    if (_activeWrapper && _activeWrapper._polyHandlers) _activeWrapper._polyHandlers.leave();
    _activeWrapper = null;
  });
  chordsEl.addEventListener('wheel', (e) => {
    const hit = findWrapperAtEvent(e);
    if (hit && hit.wrapper._polyHandlers) {
      hit.wrapper._polyHandlers.wheel(e);
    }
  }, { passive: false });
  chordsEl.addEventListener('click', (e) => {
    if (activeSequenceIdx !== seqIdx) {
      activeSequenceIdx = seqIdx;
      document.querySelectorAll('.sequence.active').forEach(s => s.classList.remove('active'));
      el.classList.add('active');
    }
    const hit = findWrapperAtEvent(e);
    if (hit && hit.wrapper._polyHandlers) {
      hit.wrapper._polyHandlers.click(e);
    } else {
      document.querySelectorAll('.chord-card.selected').forEach(c => c.classList.remove('selected'));
    }
  });

  return el;
}

function rerenderSequence(seqIdx) {
  const existing = sequencesContainer.querySelector(`.sequence[data-seq-idx="${seqIdx}"]`);
  if (!existing) { rerenderAllSequences(); return; }
  const replacement = renderSequence(seqIdx);
  existing.replaceWith(replacement);
  // Layout immediately so hover polygons are correct (don't wait for rAF)
  const chordsEl = replacement.querySelector('.sequence-chords');
  if (chordsEl) layoutSequenceCards(chordsEl);
}

function rerenderAllSequences() {
  sequencesContainer.innerHTML = '';
  for (let i = 0; i < sequences.length; i++) {
    sequencesContainer.appendChild(renderSequence(i));
  }
}

addSequenceBtn.addEventListener('click', () => {
  sequences.push({ name: `Sequence ${sequences.length + 1}`, chords: [null] });
  activeSequenceIdx = sequences.length - 1;
  rerenderAllSequences();
});

// Delete selected chords with Delete or Backspace key
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'Delete' || e.key === 'Backspace') {
    const selected = document.querySelectorAll('.chord-card.selected:not(.picker-card)');
    if (selected.length === 0) return;
    e.preventDefault();
    // Collect indices per sequence (in reverse order to splice safely)
    const toRemove = new Map(); // seqIdx → [chordIdx, ...]
    selected.forEach(card => {
      const seqEl = card.closest('.sequence');
      const container = card.closest('.sequence-chords');
      if (!seqEl || !container) return;
      const si = parseInt(seqEl.dataset.seqIdx, 10);
      const ci = [...container.children].indexOf(card.closest('.chord-card-wrapper') || card);
      if (!toRemove.has(si)) toRemove.set(si, []);
      toRemove.get(si).push(ci);
      if (card._renderer) card._renderer.dispose();
    });
    for (const [si, indices] of toRemove) {
      // Remove in reverse so indices stay valid
      for (const ci of indices.sort((a, b) => b - a)) {
        sequences[si].chords.splice(ci, 1);
      }
      // Ensure at least one picker slot remains
      if (!sequences[si].chords.some(c => c === null)) {
        sequences[si].chords.push(null);
      }
    }
    rerenderAllSequences();
  }
});

// ── Mode switching ────────────────────────────────────────────
const modePlayBtn = document.getElementById('mode-play');
const modeChordsBtn = document.getElementById('mode-chords');
const chordPanel = document.getElementById('chord-panel');
const sceneContainer = document.getElementById('scene-container');
const strumBar = document.getElementById('strum-bar');
const infoBar = document.getElementById('info-bar');
const opSlider = document.getElementById('opacity-slider');

function setMode(mode) {
  const keySel = document.getElementById('key-selector');
  if (mode === 'play') {
    chordPanel.classList.remove('visible');
    keySel.style.display = 'none';
    sceneContainer.style.display = '';
    strumBar.style.display = '';
    infoBar.style.display = '';
    opSlider.style.display = '';
    modePlayBtn.classList.add('active');
    modeChordsBtn.classList.remove('active');
  } else {
    chordPanel.classList.add('visible');
    keySel.style.display = 'flex';
    sceneContainer.style.display = 'none';
    strumBar.style.display = 'none';
    infoBar.style.display = 'none';
    opSlider.style.display = '';
    modePlayBtn.classList.remove('active');
    modeChordsBtn.classList.add('active');
    rerenderAllSequences();
  }
}

modePlayBtn.addEventListener('click', () => setMode('play'));
modeChordsBtn.addEventListener('click', () => setMode('chords'));

// Start in chord mode
setMode('chords');

</script>
