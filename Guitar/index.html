<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Guitar</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Share+Tech+Mono&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #e8e4de; font-family: 'Share Tech Mono', monospace; }
    body { display: flex; flex-direction: column; }

    #scene-container { flex: 1; position: relative; cursor: crosshair; }
    canvas { display: block; }

    /* ── Strum bar ── */
    #strum-bar {
      height: 72px; display: flex; align-items: center; justify-content: center;
      gap: 6px; background: #f0ece6; border-top: 1px solid #ccc; padding: 0 20px;
    }
    .strum-string {
      flex: 1; max-width: 80px; height: 52px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      border-radius: 6px; cursor: pointer;
      font-family: 'Rajdhani', sans-serif; font-weight: 700;
      font-size: 16px; border: 1px solid #bbb;
      transition: transform 0.08s, box-shadow 0.12s;
      user-select: none;
    }
    .strum-string:hover { transform: scale(1.08); }
    .strum-string:active { transform: scale(0.95); }
    .strum-string .note-name { font-size: 18px; }
    .strum-string .octave { font-size: 10px; opacity: 0.6; }

    /* ── Camera controls panel ── */
    #cam-panel {
      position: fixed; top: 10px; right: 10px;
      background: rgba(0,0,0,0.85); border: 1px solid #444;
      border-radius: 8px; padding: 12px; z-index: 100;
      color: #ccc; font-size: 11px; min-width: 180px;
      display: none;
    }
    #cam-panel.visible { display: block; }
    #cam-panel h3 { font-size: 12px; margin-bottom: 8px; color: #fff; letter-spacing: 2px; }
    #cam-panel p { margin: 4px 0; line-height: 1.6; }
    #cam-panel button {
      margin-top: 8px; padding: 4px 12px; font-family: inherit;
      font-size: 10px; background: #333; color: #aaa;
      border: 1px solid #555; border-radius: 4px; cursor: pointer;
      margin-right: 4px;
    }

    /* ── Info bar ── */
    #info-bar {
      position: fixed; bottom: 82px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.55); border: 1px solid #666;
      border-radius: 6px; padding: 6px 16px;
      color: #ddd; font-size: 11px; z-index: 50;
      pointer-events: none; white-space: nowrap;
    }

    #hover-info {
      position: fixed; top: 10px; left: 10px;
      color: #888; font-size: 12px; z-index: 50;
      pointer-events: none;
    }

    #capo-info {
      position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
      color: #777; font-size: 11px; z-index: 50;
      pointer-events: none; letter-spacing: 2px;
    }

    #opacity-slider {
      position: fixed; bottom: 82px; right: 16px;
      display: flex; flex-direction: column; align-items: center;
      z-index: 60; color: #888; font-size: 10px;
      letter-spacing: 1px;
    }
    #opacity-slider input[type=range] {
      writing-mode: vertical-lr; direction: rtl;
      height: 80px; margin: 4px 0;
      accent-color: #888;
    }

    /* ── Note labels overlay ── */
    #note-labels {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; overflow: hidden;
      z-index: 10;
    }
    .note-label {
      position: absolute;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      line-height: 1;
      transform: translate(-50%, -50%);
      white-space: nowrap;
      pointer-events: none;
      paint-order: stroke fill;
    }

    /* ── Mode toggle ── */
    #mode-toggle {
      position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 0; z-index: 200;
      border-radius: 6px; overflow: hidden;
      border: 1px solid #999;
    }
    #mode-toggle button {
      padding: 6px 18px; font-family: 'Rajdhani', sans-serif;
      font-weight: 700; font-size: 13px; letter-spacing: 2px;
      border: none; cursor: pointer;
      background: #ddd; color: #666;
      transition: background 0.15s, color 0.15s;
    }
    #mode-toggle button.active {
      background: #333; color: #eee;
    }

    /* ── Chord panel ── */
    #chord-panel {
      display: none; position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      background: #e8e4de;
      z-index: 150; overflow-y: auto;
      padding: 50px 20px 20px;
    }
    #chord-panel.visible { display: block; }

    .picker-note-label {
      transition: transform 0.1s, filter 0.1s;
    }
    #chord-sliders {
      position: fixed; top: 50px; right: 16px; z-index: 200;
      display: flex; flex-direction: column; gap: 6px;
      font-family: 'Rajdhani', sans-serif; font-weight: 700;
      font-size: 12px; letter-spacing: 1px; color: #888;
    }
    #key-selector {
      display: none;
      position: fixed; top: 42px; left: 50%; transform: translateX(-50%); z-index: 200;
      align-items: center; gap: 6px;
      font-family: 'Rajdhani', sans-serif; font-weight: 700;
      font-size: 13px; letter-spacing: 1px; color: #888;
    }
    #key-selector label { white-space: nowrap; }
    #key-selector select {
      font-family: 'Rajdhani', sans-serif; font-weight: 700;
      font-size: 13px; letter-spacing: 1px;
      background: rgba(255,255,255,0.5); border: 1px solid #ccc;
      border-radius: 4px; padding: 2px 6px; cursor: pointer;
    }
    #key-selector .key-notes {
      font-size: 11px; color: #aaa; letter-spacing: 0.5px;
    }
    .slider-row {
      display: flex; align-items: center; gap: 6px;
    }
    .slider-row input[type=range] { width: 100px; cursor: pointer; }
    .slider-row .slider-val { min-width: 30px; text-align: center; }

    #sequences-container {
      padding: 0 10px 20px;
    }
    .sequence {
      margin-bottom: 24px;
    }
    .sequence-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 8px; padding: 0 4px;
    }
    .sequence-name {
      font-family: 'Rajdhani', sans-serif; font-weight: 700;
      font-size: 20px; letter-spacing: 1px;
      border: none; background: transparent;
      color: #555; padding: 2px 6px;
      border-bottom: 2px solid transparent;
      outline: none; min-width: 80px;
    }
    .sequence-name:focus, .sequence-name:hover {
      border-bottom-color: #bbb;
    }
    .sequence-delete {
      font-family: 'Rajdhani', sans-serif; font-weight: 700;
      font-size: 12px; letter-spacing: 1px; text-transform: uppercase;
      border: 1px solid #ccc; border-radius: 4px;
      background: transparent; color: #aaa; cursor: pointer;
      padding: 2px 8px;
    }
    .sequence-delete:hover { color: #e55; border-color: #e55; }
    .sequence-chords {
      position: relative;
      min-height: 40px;
      padding: 4px;
      border-radius: 8px;
      border: 2px dashed transparent;
      transition: background 0.15s, border-color 0.15s;
      overflow: visible;
    }
    .sequence.active .sequence-chords {
      border-color: rgba(0,0,0,0.12);
    }
    .sequence-chords.drag-over {
      background: rgba(0,0,0,0.04);
    }
    #add-sequence-btn {
      display: block; margin: 0 auto 40px;
      font-family: 'Rajdhani', sans-serif; font-weight: 700;
      font-size: 14px; letter-spacing: 2px;
      padding: 8px 24px; border-radius: 6px;
      border: 2px dashed #ccc; background: transparent;
      color: #999; cursor: pointer;
    }
    #add-sequence-btn:hover { border-color: #999; color: #666; }
    .chord-card.dragging { opacity: 0.4; }
    .chord-card.drag-target-left::before,
    .chord-card.drag-target-right::after {
      content: ''; position: absolute; top: 10%; height: 80%;
      width: 3px; background: #888; border-radius: 2px; z-index: 10;
    }
    .chord-card.drag-target-left::before { left: -4px; }
    .chord-card.drag-target-right::after { right: -4px; }
    .chord-card {
      position: relative;
      cursor: pointer;
      pointer-events: auto;
      /* width/height/clip-path/margin set dynamically */
    }
    .chord-card.selected {
      filter: brightness(0.85);
      outline: 2px solid #888;
      outline-offset: -2px;
    }
    .chord-card-canvas {
      position: absolute;
      display: block;
    }
    .chord-card-name {
      font-family: 'Rajdhani', sans-serif; font-weight: 700;
      font-size: 22px; color: #555;
      pointer-events: none; letter-spacing: 2px;
      white-space: nowrap; text-align: center;
      line-height: 1;
    }
    .chord-card-name .chord-suffix {
      font-size: 15px; letter-spacing: 1px;
    }
    .mini-note-label {
      position: absolute;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      line-height: 1;
      transform: translate(-50%, -50%);
      pointer-events: none;
      white-space: nowrap;
      paint-order: stroke fill;
    }
    .mini-note-label sub {
      font-size: 0.55em;
      vertical-align: baseline;
      position: relative;
      bottom: -0.25em;
      paint-order: stroke fill;
    }
    .chord-card-wrapper {
      position: absolute;
      display: flex; flex-direction: column; align-items: center;
      pointer-events: none;
    }
    .chord-type-list {
      display: flex; flex-direction: column; gap: 0;
      font-family: 'Rajdhani', sans-serif; font-weight: 700;
      font-size: 12px; letter-spacing: 1px; line-height: 1.35;
      pointer-events: none;
      opacity: 0; transition: opacity 0.15s;
      text-align: left;
      position: absolute;
      white-space: nowrap;
      bottom: 100%;
      left: 0;
    }
    .chord-card-wrapper:hover .chord-type-list { /* visibility controlled by JS polygon detection */ }
    .chord-type-list .type-row {
      display: flex; align-items: center; gap: 0;
      padding: 1px 4px;
    }
    .chord-type-list .type-row.active .type-label { color: #555; }
    .chord-type-list .type-label {
      color: rgba(0,0,0,0.3);
      min-width: 52px;
      white-space: nowrap;
    }
    .chord-type-list .interval-grid {
      display: flex; gap: 2px;
    }
    .chord-type-list .interval-cell {
      width: 10px; height: 10px; border-radius: 50%;
      background: rgba(0,0,0,0.08);
    }
    .chord-type-list .type-row.active .interval-cell {
      background: rgba(0,0,0,0.12);
    }
    .chord-type-list .interval-cell.on {
      /* default color; overridden by inline note color */
      background: rgba(0,0,0,0.3);
    }
    .chord-type-list .type-row.active .interval-cell.on {
      /* default; overridden by inline note color */
      background: #555;
    }
    .chord-type-list .type-row.unavailable { opacity: 0.25; }
    .chord-type-list .interval-cell.accidental {
      opacity: 0.18;
    }
  </style>
</head>
<body>
  <div id="mode-toggle">
    <button id="mode-play">PLAY</button>
    <button id="mode-chords" class="active">CHORDS</button>
  </div>

  <div id="key-selector">
    <label>KEY</label>
    <select id="key-select">
      <option value="">Any</option>
    </select>
    <span class="key-notes" id="key-notes-display"></span>
  </div>

  <div id="chord-panel" class="visible">
    <div id="chord-sliders">
      <div class="slider-row">
        <label for="gap-slider">GAP</label>
        <input type="range" id="gap-slider" min="0" max="120" value="50">
        <span id="gap-value" class="slider-val">50</span>
      </div>
      <div class="slider-row">
        <label for="scale-slider">SCALE</label>
        <input type="range" id="scale-slider" min="20" max="200" value="100">
        <span id="scale-value" class="slider-val">100%</span>
      </div>
    </div>
    <div id="sequences-container"></div>
    <button id="add-sequence-btn">+ Add Sequence</button>
  </div>

  <div id="scene-container">
    <div id="note-labels"></div>
  </div>
  <div id="strum-bar"></div>
  <div id="cam-panel">
    <h3>CAMERA</h3>
    <p>Left-drag: orbit</p>
    <p>Right-drag: pan</p>
    <p>Scroll: zoom</p>
    <button id="cam-reset">Reset</button>
    <button id="cam-print">Print to console</button>
  </div>
  <div id="hover-info"></div>
  <div id="info-bar"><b>Click</b> to place/remove &nbsp;·&nbsp; <b>0</b> clear all &nbsp;·&nbsp; <b>C</b> camera info &nbsp;·&nbsp; <b>+/−</b> capo &nbsp;·&nbsp; drag/scroll to orbit</div>
  <div id="capo-info"></div>
  <div id="opacity-slider">
    <label for="board-opacity">BOARD</label>
    <input type="range" id="board-opacity" min="0" max="100" value="100">
  </div>

<script>
/* ═══════════════════════════════════════════════════════════════
   GUITAR 3D — Three.js fretboard renderer
   ═══════════════════════════════════════════════════════════════ */

// ── Music theory ──────────────────────────────────────────────
const NOTES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const NOTE_COLORS = {
  'C':  {l:0.830, c:0.0320, h:164.4},
  'C#': {l:0.830, c:0.0320, h:164.4},
  'D':  {l:0.670, c:0.1672, h:51.0},
  'D#': {l:0.670, c:0.1672, h:51.0},
  'E':  {hex: 0xf4ea77},
  'F':  {l:0.830, c:0.1207, h:132.9},
  'F#': {l:0.830, c:0.1207, h:132.9},
  'G':  {l:0.330, c:0.0103, h:351.2},
  'G#': {l:0.330, c:0.0103, h:351.2},
  'A':  {l:0.590, c:0.0036, h:19.3},
  'A#': {l:0.590, c:0.0036, h:19.3},
  'B':  {l:0.630, c:0.2117, h:27.8},
};

const OPEN_STRINGS = [
  { id: 0, note: 'E', oct: 4, gauge: 0.254 },  // high E (mm)
  { id: 1, note: 'B', oct: 3, gauge: 0.318 },
  { id: 2, note: 'G', oct: 3, gauge: 0.406 },
  { id: 3, note: 'D', oct: 3, gauge: 0.762 },
  { id: 4, note: 'A', oct: 2, gauge: 1.067 },
  { id: 5, note: 'E', oct: 2, gauge: 1.168 },  // low E
];

function noteAtFret(str, fret) {
  const base = (str.oct + 1) * 12 + NOTES.indexOf(str.note);
  const m = base + fret;
  return { name: NOTES[m % 12], oct: Math.floor(m / 12) - 1, midi: m };
}

// OKLCH → hex for Three.js materials
const _oklchCanvas = document.createElement('canvas');
_oklchCanvas.width = 1; _oklchCanvas.height = 1;
const _oklchCtx = _oklchCanvas.getContext('2d');
function oklchToHex(name) {
  const nc = NOTE_COLORS[name] || NOTE_COLORS['C'];
  if (nc.hex !== undefined) return nc.hex;
  _oklchCtx.fillStyle = `oklch(${nc.l} ${nc.c} ${nc.h})`;
  _oklchCtx.fillRect(0, 0, 1, 1);
  const [r, g, b] = _oklchCtx.getImageData(0, 0, 1, 1).data;
  return (r << 16) | (g << 8) | b;
}

// ── Guitar geometry (mm, real proportions) ────────────────────
const SCALE_LENGTH = 650;
const NUT_WIDTH = 43;
const WIDTH_AT_12 = 52;
const FRETBOARD_THICKNESS = 7;
const FRET_WIRE_WIDTH = 2.0;
const FRET_WIRE_HEIGHT = 1.2;
const NUT_HEIGHT = 2.0;
const NUT_THICKNESS = 5;
const STRING_HEIGHT_AT_NUT = 0.5;
const STRING_HEIGHT_AT_12 = 2.5;
const NUM_FRETS = 5;
const DOT_FRETS = [3, 5];
const STRING_PAD = 3.5;  // mm from board edge to outermost string

function fretPosition(n) {
  return SCALE_LENGTH * (1 - Math.pow(2, -n / 12));
}
function boardWidthAt(dist) {
  const t = dist / fretPosition(12);
  return NUT_WIDTH + (WIDTH_AT_12 - NUT_WIDTH) * t;
}
function stringHeightAt(dist) {
  const t = dist / fretPosition(12);
  return STRING_HEIGHT_AT_NUT + (STRING_HEIGHT_AT_12 - STRING_HEIGHT_AT_NUT) * t;
}
function stringZ(strId, xPos) {
  const w = boardWidthAt(xPos);
  return -w / 2 + STRING_PAD + (strId / 5) * (w - 2 * STRING_PAD);
}

// ── State ─────────────────────────────────────────────────────
let capo = 0;
const fingers = [
  { id: 0, strId: null, fret: null },
  { id: 1, strId: null, fret: null },
  { id: 2, strId: null, fret: null },
  { id: 3, strId: null, fret: null },
];
let hoveredCell = null;

// ── Audio ─────────────────────────────────────────────────────
let AC, MG;
function ensureAudio() {
  if (!AC) {
    AC = new (window.AudioContext || window.webkitAudioContext)();
    MG = AC.createGain(); MG.gain.value = 0.52; MG.connect(AC.destination);
  }
  if (AC.state === 'suspended') AC.resume();
}
function pluck(midi, startTime) {
  ensureAudio();
  const f = 440 * Math.pow(2, (midi - 69) / 12);
  const t = startTime !== undefined ? startTime : AC.currentTime;
  const env = AC.createGain();
  env.gain.setValueAtTime(0, t);
  env.gain.linearRampToValueAtTime(0.42, t + 0.007);
  env.gain.exponentialRampToValueAtTime(0.001, t + 2.4);
  const flt = AC.createBiquadFilter();
  flt.type = 'lowpass';
  flt.frequency.setValueAtTime(f * 15, t);
  flt.frequency.exponentialRampToValueAtTime(f * 1.9, t + 0.38);
  flt.Q.value = 1.4;
  flt.connect(env); env.connect(MG);
  [[1, 0.55, 'sawtooth'], [2, 0.20, 'triangle'], [0.5, 0.07, 'sine']].forEach(([harm, gain, type]) => {
    const o = AC.createOscillator(), g = AC.createGain();
    o.type = type; o.frequency.value = f * harm;
    g.gain.value = gain; o.connect(g); g.connect(flt);
    o.start(t); o.stop(t + 2.4);
  });
}
function strumChord(chord) {
  ensureAudio();
  const strumDelay = 0.03; // seconds between strings
  const t0 = AC.currentTime;
  let count = 0;
  for (let si = 0; si < 6; si++) {
    const fretVal = chord.frets[si];
    if (fretVal === null) continue;
    const strIdx = 5 - si;
    const str = OPEN_STRINGS[strIdx];
    const note = noteAtFret(str, fretVal);
    pluck(note.midi, t0 + count * strumDelay);
    count++;
  }
}

// ── Three.js setup ────────────────────────────────────────────
const container = document.getElementById('scene-container');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xe8e4de);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
container.appendChild(renderer.domElement);

const camera = new THREE.PerspectiveCamera(35, 1, 0.1, 5000);

const CAM_DEFAULTS = {
  x: 137, y: 130, z: 99,
  lookX: 61, lookY: -63, lookZ: -31,
  fov: 39,
};
function applyCam(v) {
  camera.position.set(v.x, v.y, v.z);
  camera.lookAt(v.lookX, v.lookY, v.lookZ);
  camera.fov = v.fov;
  camera.updateProjectionMatrix();
}
applyCam(CAM_DEFAULTS);

// Lighting
scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const keyLight = new THREE.DirectionalLight(0xffffff, 0.7);
keyLight.position.set(-50, 200, 100);
keyLight.castShadow = true;
keyLight.shadow.mapSize.set(2048, 2048);
const sc = keyLight.shadow.camera;
sc.near = 1; sc.far = 500; sc.left = -200; sc.right = 200; sc.top = 200; sc.bottom = -200;
scene.add(keyLight);
const fillLight = new THREE.DirectionalLight(0xaabbff, 0.3);
fillLight.position.set(100, 80, -50);
scene.add(fillLight);
scene.add(new THREE.PointLight(0xffeedd, 0.4, 400).translateX(0).translateY(50).translateZ(-80));

// ── Environment map for metallic materials ────────────────────
const pmremGen = new THREE.PMREMGenerator(renderer);
pmremGen.compileCubemapShader();
const envScene = new THREE.Scene();
envScene.background = new THREE.Color(0xf0ece8);
envScene.add(new THREE.AmbientLight(0xffffff, 1.5));
const envD1 = new THREE.DirectionalLight(0xffffff, 1.2);
envD1.position.set(1, 2, 1);
envScene.add(envD1);
const envD2 = new THREE.DirectionalLight(0xeef4ff, 0.8);
envD2.position.set(-1, 0.5, -1);
envScene.add(envD2);
const envRT = pmremGen.fromScene(envScene, 0, 0.1, 1000);
const metalEnvMap = envRT.texture;
pmremGen.dispose();

// ── Fretboard mesh ────────────────────────────────────────────
// X = along neck (0 at nut, + toward bridge)
// Y = up from surface
// Z = across strings (0 = center, -Z = high E side, +Z = low E side)

function boardEnd() { return fretPosition(NUM_FRETS + capo) + 10; }

function buildFretboardGeo() {
  const end = boardEnd();
  const steps = 40;
  const verts = [], idx = [], uvs = [];

  // Top surface
  for (let i = 0; i <= steps; i++) {
    const t = i / steps, x = t * end, w = boardWidthAt(x) / 2;
    verts.push(x, 0, -w, x, 0, w);
    uvs.push(t, 0, t, 1);
    if (i < steps) {
      const a = i * 2;
      idx.push(a, a+1, a+2, a+1, a+3, a+2);
    }
  }
  // Bottom (faces -Y)
  const b0 = (steps + 1) * 2;
  for (let i = 0; i <= steps; i++) {
    const t = i / steps, x = t * end, w = boardWidthAt(x) / 2;
    verts.push(x, -FRETBOARD_THICKNESS, -w, x, -FRETBOARD_THICKNESS, w);
    uvs.push(t, 0, t, 1);
    if (i < steps) {
      const a = b0 + i * 2;
      idx.push(a, a+2, a+1, a+1, a+2, a+3);
    }
  }
  // End cap at x=0 (nut end)
  const e0 = verts.length / 3;
  const w0 = boardWidthAt(0) / 2;
  verts.push(0, 0, -w0, 0, 0, w0, 0, -FRETBOARD_THICKNESS, -w0, 0, -FRETBOARD_THICKNESS, w0);
  uvs.push(0, 0, 0, 1, 0, 0, 0, 1);
  idx.push(e0, e0+2, e0+1, e0+1, e0+2, e0+3);
  // End cap at x=end (bridge end)
  const e1 = verts.length / 3;
  const wE = boardWidthAt(end) / 2;
  verts.push(end, 0, -wE, end, 0, wE, end, -FRETBOARD_THICKNESS, -wE, end, -FRETBOARD_THICKNESS, wE);
  uvs.push(1, 0, 1, 1, 1, 0, 1, 1);
  idx.push(e1, e1+1, e1+2, e1+1, e1+3, e1+2);
  // Near side (z = -w) — normal faces -Z
  const s0 = verts.length / 3;
  for (let i = 0; i <= steps; i++) {
    const t = i / steps, x = t * end, w = boardWidthAt(x) / 2;
    verts.push(x, 0, -w, x, -FRETBOARD_THICKNESS, -w);
    uvs.push(t, 0, t, 1);
    if (i < steps) {
      const a = s0 + i * 2;
      idx.push(a, a+2, a+1, a+1, a+2, a+3);
    }
  }
  // Far side (z = +w) — normal faces +Z
  const s1 = verts.length / 3;
  for (let i = 0; i <= steps; i++) {
    const t = i / steps, x = t * end, w = boardWidthAt(x) / 2;
    verts.push(x, 0, w, x, -FRETBOARD_THICKNESS, w);
    uvs.push(t, 0, t, 1);
    if (i < steps) {
      const a = s1 + i * 2;
      idx.push(a, a+1, a+2, a+1, a+3, a+2);
    }
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
  geo.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
  geo.setIndex(idx);
  geo.computeVertexNormals();
  return geo;
}

// Procedural wood texture
const woodCanvas = document.createElement('canvas');
woodCanvas.width = 512; woodCanvas.height = 512;
const wctx = woodCanvas.getContext('2d');
// White base
wctx.fillStyle = '#ffffff';
wctx.fillRect(0, 0, 512, 512);
// Subtle grain lines for texture
for (let i = 0; i < 200; i++) {

  wctx.strokeStyle = `rgba(200,200,200,${alpha})`;
  wctx.lineWidth = 0.5 + Math.random() * 2;
  wctx.beginPath();
  wctx.moveTo(0, y);
  for (let x = 0; x < 512; x += 15) {
    wctx.lineTo(x, y + (Math.random() - 0.5) * 3);
  }
  wctx.stroke();
}
const woodTex = new THREE.CanvasTexture(woodCanvas);
woodTex.wrapS = THREE.RepeatWrapping;
woodTex.wrapT = THREE.RepeatWrapping;
woodTex.repeat.set(4, 1);

const boardMat = new THREE.MeshStandardMaterial({
  color: 0xffffff, roughness: 0.75, metalness: 0.03, map: woodTex,
  side: THREE.DoubleSide, transparent: true,
});
const fretboardMesh = new THREE.Mesh(buildFretboardGeo(), boardMat);
fretboardMesh.receiveShadow = true;
scene.add(fretboardMesh);

// ── Nut ───────────────────────────────────────────────────────
const nutMat = new THREE.MeshStandardMaterial({ color: 0xf5f0e0, roughness: 0.4, metalness: 0.05, side: THREE.DoubleSide });
function makeNut() {
  const w = boardWidthAt(0);
  const geo = new THREE.BoxGeometry(NUT_THICKNESS, NUT_HEIGHT + 1, w);
  const m = new THREE.Mesh(geo, nutMat);
  m.position.set(-NUT_THICKNESS / 2, NUT_HEIGHT / 2 - 0.5, 0);
  m.castShadow = true;
  return m;
}
let nutMesh = makeNut();
scene.add(nutMesh);

// ── Fret wires ────────────────────────────────────────────────
const fretWireMat = new THREE.MeshStandardMaterial({ color: 0xd0d0d0, roughness: 0.15, metalness: 0.95, envMap: metalEnvMap, envMapIntensity: 1.0, side: THREE.DoubleSide, transparent: true });
let fretWireMeshes = [];
function buildFretWires() {
  fretWireMeshes.forEach(m => scene.remove(m));
  fretWireMeshes = [];
  for (let i = 1; i <= NUM_FRETS; i++) {
    const x = fretPosition(i + capo);
    const w = boardWidthAt(x);
    const halfW = FRET_WIRE_WIDTH / 2; // horizontal half-width
    const fretH = FRET_WIRE_HEIGHT;     // vertical height (dome peak)
    // Elliptical semicircle cross-section: narrow X, taller Y
    const shape = new THREE.Shape();
    const segs = 24;
    shape.moveTo(halfW, 0);
    for (let s = 0; s <= segs; s++) {
      const a = (s / segs) * Math.PI;
      shape.lineTo(Math.cos(a) * halfW, Math.sin(a) * fretH);
    }
    shape.lineTo(halfW, 0);
    const geo = new THREE.ExtrudeGeometry(shape, { depth: w + 0.1, bevelEnabled: false });
    const m = new THREE.Mesh(geo, fretWireMat);
    m.position.set(x, 0, -(w + 0.1) / 2);
    m.castShadow = true;
    scene.add(m);
    fretWireMeshes.push(m);
  }
}
buildFretWires();

// ── Fret dots (disabled) ───────────────────────────────────
let dotMeshes = [];
function buildDots() {}

// ── Strings (colored by active note, piecewise-linear deflection) ──
let stringMeshes = [];

// String Y at a given X when no finger is pressing
function openStringY(x) {
  return stringHeightAt(x) + FRET_WIRE_HEIGHT;
}

const STRING_R = 0.35; // base string radius for marker positioning

function buildStrings() {
  stringMeshes.forEach(m => { scene.remove(m); m.geometry.dispose(); m.material.dispose(); });
  stringMeshes = [];
  const end = boardEnd();

  for (let i = 0; i < 6; i++) {
    const str = OPEN_STRINGS[i];
    const r = Math.max(str.gauge / 2, 0.15); // differential thickness from gauge

    // Find highest pressed fret on this string
    let pressFret = null;
    for (const f of fingers) {
      if (f.strId === i && f.fret !== null) {
        if (pressFret === null || f.fret > pressFret) pressFret = f.fret;
      }
    }

    let pressFretX = null;
    if (pressFret !== null) {
      pressFretX = fretPosition(pressFret + capo);
    }

    const fretTopY = FRET_WIRE_HEIGHT + r; // bottom of string touches fret top
    const nutY = STRING_HEIGHT_AT_NUT + FRET_WIRE_HEIGHT + r;

    // Helper: compute Y at a given X for this string (Y = center of string)
    function strY(x) {
      if (pressFretX !== null) {
        if (x <= pressFretX) {
          const tSeg = pressFretX > 0 ? x / pressFretX : 0;
          return nutY + (fretTopY - nutY) * tSeg;
        } else {
          const tSeg = (x - pressFretX) / (end - pressFretX);
          return fretTopY + (openStringY(end) - fretTopY) * tSeg;
        }
      }
      return openStringY(x);
    }

    const activeNote = getActiveNote(i);
    const noteHex = oklchToHex(activeNote.name);

    // Build two segments: muted (nut→fret, low opacity) and active (fret→end, full)
    // If no fret pressed, entire string is active
    const splitX = pressFretX !== null ? pressFretX : 0;

    function makeSegment(xStart, xEnd, opacity) {
      const numPts = 40;
      const pts = [];
      for (let s = 0; s <= numPts; s++) {
        const t = s / numPts;
        const x = xStart + t * (xEnd - xStart);
        pts.push(new THREE.Vector3(x, strY(x), stringZ(i, x)));
      }
      const curve = new THREE.CatmullRomCurve3(pts);
      curve.curveType = 'catmullrom';
      curve.tension = 1;
      const geo = new THREE.TubeGeometry(curve, numPts, r, 8, false);
      const mat = new THREE.MeshBasicMaterial({
        color: noteHex,
        transparent: opacity < 1,
        opacity: opacity,
        depthWrite: opacity >= 1,
      });
      const m = new THREE.Mesh(geo, mat);
      scene.add(m);
      stringMeshes.push(m);
    }

    if (pressFretX !== null && pressFretX > 0.1) {
      makeSegment(0, pressFretX, 0.3);  // muted portion
    }
    const activeStart = pressFretX !== null ? pressFretX : 0;
    makeSegment(activeStart, end, 1.0);  // active portion
  }
}
buildStrings();

// ── Capo mesh ─────────────────────────────────────────────────
let capoMesh = null;
function buildCapo() {
  if (capoMesh) { scene.remove(capoMesh); capoMesh = null; }
  if (capo === 0) return;
  const x = fretPosition(capo) - 3;
  const w = boardWidthAt(x);
  const geo = new THREE.BoxGeometry(6, 8, w + 6);
  const mat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.6, metalness: 0.3 });
  capoMesh = new THREE.Mesh(geo, mat);
  capoMesh.position.set(x, 3, 0);
  capoMesh.castShadow = true;
  scene.add(capoMesh);
}
buildCapo();

// ── Hit zones (invisible, for raycasting) ─────────────────────
const hitGroup = new THREE.Group();
scene.add(hitGroup);
let hitZones = [];

function buildHitZones() {
  hitZones.forEach(h => hitGroup.remove(h.mesh));
  hitZones = [];
  for (let si = 0; si < 6; si++) {
    for (let fi = 1; fi <= NUM_FRETS; fi++) {
      const x1 = fretPosition(fi - 1 + capo);
      const x2 = fretPosition(fi + capo);
      const cx = (x1 + x2) / 2;
      const fw = x2 - x1;
      const wAtCx = boardWidthAt(cx);
      const zAtCx = stringZ(si, cx);
      const cellH = (wAtCx - 2 * STRING_PAD) / 5;
      const geo = new THREE.PlaneGeometry(fw, cellH);
      const mat = new THREE.MeshBasicMaterial({ visible: false, side: THREE.DoubleSide });
      const m = new THREE.Mesh(geo, mat);
      m.rotation.x = -Math.PI / 2;
      m.position.set(cx, 0.1, zAtCx);
      hitGroup.add(m);
      hitZones.push({ mesh: m, strId: si, fret: fi });
    }
  }
}
buildHitZones();

// ── Finger markers (simple circles) ───────────────────────────
const fingerGroup = new THREE.Group();
scene.add(fingerGroup);

function fingerXYZ(strId, fret) {
  const x1 = fretPosition(fret - 1 + capo);
  const x2 = fretPosition(fret + capo);
  const x = (x1 + x2) / 2;
  const z = stringZ(strId, x);
  const y = FRET_WIRE_HEIGHT;
  return { x, y, z };
}

// ── Note label data for HTML overlay ──
const noteLabelData = []; // {worldPos: Vector3, name: string, hex: number}

function rebuildFingers() {
  fingerGroup.traverse(c => {
    if (c.geometry) c.geometry.dispose();
    if (c.material) { if (c.material.map) c.material.map.dispose(); c.material.dispose(); }
  });
  while (fingerGroup.children.length) fingerGroup.remove(fingerGroup.children[0]);
  noteLabelData.length = 0;

  // Long axis (along string / X) = 2/3 the distance from nut to first fret
  const firstGap = fretPosition(1 + capo) - fretPosition(0 + capo);
  const markerDiamX = firstGap * 2 / 3;
  // Short axis (across strings / Z) = distance between adjacent strings
  const midX = firstGap / 2;
  const bw = boardWidthAt(midX);
  const stringSpacing = (bw - 2 * STRING_PAD) / 5;
  const markerDiamZ = stringSpacing * 1.3;

  // Sort fingers so higher strId (lower/deeper strings) render on top
  const sortedFingers = fingers.filter(f => f.strId !== null && f.fret !== null)
    .sort((a, b) => a.strId - b.strId);

  for (const f of sortedFingers) {
    const pos = fingerXYZ(f.strId, f.fret);
    const str = OPEN_STRINGS[f.strId];
    const strRadius = Math.max(str.gauge / 2, 0.15);
    const note = noteAtFret(str, f.fret + capo);
    const noteHex = oklchToHex(note.name);

    // Elliptical marker on the fretboard
    const geo = new THREE.CircleGeometry(1, 32);
    const mat = new THREE.MeshBasicMaterial({
      color: noteHex,
      side: THREE.DoubleSide,
    });
    const ellipse = new THREE.Mesh(geo, mat);
    ellipse.renderOrder = f.strId + 1; // deeper strings on top
    ellipse.rotation.x = -Math.PI / 2;
    ellipse.scale.set(markerDiamX / 2, markerDiamZ / 2, 1);
    const stringTopY = FRET_WIRE_HEIGHT + strRadius * 2;
    ellipse.position.set(pos.x, stringTopY + 0.15, pos.z);
    fingerGroup.add(ellipse);

    // Store label data for HTML overlay (positioned at marker center)
    noteLabelData.push({
      worldPos: new THREE.Vector3(pos.x, stringTopY + 0.3, pos.z),
      name: note.name,
      hex: noteHex,
      strId: f.strId,
    });
  }

  // Open string labels at the nut
  for (let si = 0; si < 6; si++) {
    const hasPress = sortedFingers.some(f => f.strId === si);
    if (hasPress) continue; // skip — already has a fretted label
    const str = OPEN_STRINGS[si];
    const note = noteAtFret(str, capo);
    const noteHex = oklchToHex(note.name);
    const nutX = -NUT_THICKNESS / 2;
    const zAtNut = stringZ(si, 0);
    const strRadius = Math.max(str.gauge / 2, 0.15);
    const yPos = FRET_WIRE_HEIGHT + strRadius * 2 + 0.3;
    noteLabelData.push({
      worldPos: new THREE.Vector3(nutX, yPos, zAtNut),
      name: note.name,
      hex: noteHex,
      strId: si,
    });
  }
}
rebuildFingers();

// ── Hover indicator ───────────────────────────────────────────
let hoverMesh = null;
const hoverMat = new THREE.MeshStandardMaterial({
  color: 0xffffff, transparent: true, opacity: 0.15,
  depthWrite: false, side: THREE.DoubleSide,
});

function updateHover() {
  if (hoverMesh) { scene.remove(hoverMesh); hoverMesh = null; }
  if (!hoveredCell) return;
  const pos = fingerXYZ(hoveredCell.strId, hoveredCell.fret);
  const s = new THREE.Shape();
  s.ellipse(0, 0, 4, 3, 0, Math.PI * 2, false, 0);
  hoverMesh = new THREE.Mesh(new THREE.ShapeGeometry(s, 24), hoverMat);
  hoverMesh.rotation.x = -Math.PI / 2;
  hoverMesh.position.set(pos.x, 0.2, pos.z);
  scene.add(hoverMesh);
}

// ── Raycasting ────────────────────────────────────────────────
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function onPointerMove(e) {
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(hitZones.map(h => h.mesh));
  if (hits.length > 0) {
    const zone = hitZones.find(h => h.mesh === hits[0].object);
    if (zone) {
      hoveredCell = { strId: zone.strId, fret: zone.fret };
      const note = noteAtFret(OPEN_STRINGS[zone.strId], zone.fret + capo);
      document.getElementById('hover-info').textContent =
        `String ${zone.strId + 1} · Fret ${zone.fret} · ${note.name}${note.oct}`;
    }
  } else {
    hoveredCell = null;
    document.getElementById('hover-info').textContent = '';
  }
  updateHover();
}
renderer.domElement.addEventListener('pointermove', onPointerMove);

// ── Finger placement (click to toggle) ────────────────────────
function toggleFinger(strId, fret) {
  // If already placed here exactly, remove it
  const existing = fingers.find(f => f.strId === strId && f.fret === fret);
  if (existing) {
    existing.strId = null; existing.fret = null;
  } else {
    // Remove any existing marker on the same string first
    const sameStr = fingers.find(f => f.strId === strId);
    if (sameStr) {
      sameStr.strId = null; sameStr.fret = null;
    }
    // Find first free slot
    const free = fingers.find(f => f.strId === null);
    if (!free) return; // all 4 slots used
    free.strId = strId; free.fret = fret;
  }
  rebuildFingers();
  buildStrings();
  updateStrumBar();
}

// ── Keyboard ──────────────────────────────────────────────────
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === '0') {
    fingers.forEach(f => { f.strId = null; f.fret = null; });
    rebuildFingers(); buildStrings(); updateStrumBar();
    return;
  }
  if (e.key === 'c' || e.key === 'C') {
    document.getElementById('cam-panel').classList.toggle('visible');
    return;
  }
  if (e.key === '=' || e.key === '+') { capo = Math.min(capo + 1, 12); rebuildAll(); return; }
  if (e.key === '-' || e.key === '_') { capo = Math.max(capo - 1, 0); rebuildAll(); return; }
});

// ── Full rebuild (capo change) ────────────────────────────────
function rebuildAll() {
  fretboardMesh.geometry.dispose();
  fretboardMesh.geometry = buildFretboardGeo();
  scene.remove(nutMesh); nutMesh = makeNut(); scene.add(nutMesh);
  buildFretWires(); buildDots(); buildStrings();
  buildCapo(); buildHitZones(); rebuildFingers(); updateStrumBar();
  document.getElementById('capo-info').textContent = capo > 0 ? `CAPO ${capo}` : '';
}

// ── Strum bar ─────────────────────────────────────────────────
function getActiveNote(strId) {
  let maxFret = 0;
  for (const f of fingers)
    if (f.strId === strId && f.fret !== null && f.fret > maxFret) maxFret = f.fret;
  return noteAtFret(OPEN_STRINGS[strId], maxFret + capo);
}

function updateStrumBar() {
  const bar = document.getElementById('strum-bar');
  bar.innerHTML = '';
  for (let i = 0; i < 6; i++) {
    const note = getActiveNote(i);
    const hex = oklchToHex(note.name);
    const r = (hex >> 16) & 0xff, g = (hex >> 8) & 0xff, b = hex & 0xff;
    const div = document.createElement('div');
    div.className = 'strum-string';
    div.style.background = `rgba(${r},${g},${b},0.15)`;
    div.style.borderColor = `rgba(${r},${g},${b},0.4)`;
    div.style.color = `rgb(${r},${g},${b})`;
    div.innerHTML = `<span class="note-name">${note.name}</span><span class="octave">${note.oct}</span>`;
    div.addEventListener('click', () => pluck(note.midi));
    bar.appendChild(div);
  }
}
updateStrumBar();

// ── Camera controls (orbit) ──────────────────────────────────
// Left-drag = orbit, right-drag = pan, scroll = zoom
const orbit = {
  target: new THREE.Vector3(CAM_DEFAULTS.lookX, CAM_DEFAULTS.lookY, CAM_DEFAULTS.lookZ),
  spherical: new THREE.Spherical(),
  dragging: false,
  panning: false,
  lastX: 0, lastY: 0,
};
// Initialize spherical from default camera offset
(function initOrbit() {
  const offset = new THREE.Vector3().subVectors(camera.position, orbit.target);
  orbit.spherical.setFromVector3(offset);
})();

function updateCameraFromOrbit() {
  const offset = new THREE.Vector3().setFromSpherical(orbit.spherical);
  camera.position.copy(orbit.target).add(offset);
  camera.lookAt(orbit.target);
}

renderer.domElement.addEventListener('pointerdown', (e) => {
  if (e.button === 0 && hoveredCell) {
    toggleFinger(hoveredCell.strId, hoveredCell.fret);
    return;
  }
  if (e.button === 0) {
    orbit.dragging = true;
    orbit.lastX = e.clientX; orbit.lastY = e.clientY;
  } else if (e.button === 2) {
    orbit.panning = true;
    orbit.lastX = e.clientX; orbit.lastY = e.clientY;
    e.preventDefault();
  }
});

renderer.domElement.addEventListener('pointermove', (e) => {
  if (orbit.dragging) {
    const dx = e.clientX - orbit.lastX;
    const dy = e.clientY - orbit.lastY;
    orbit.lastX = e.clientX; orbit.lastY = e.clientY;
    orbit.spherical.theta -= dx * 0.005;
    orbit.spherical.phi -= dy * 0.005;
    orbit.spherical.phi = Math.max(0.05, Math.min(Math.PI - 0.05, orbit.spherical.phi));
    updateCameraFromOrbit();
  } else if (orbit.panning) {
    const dx = e.clientX - orbit.lastX;
    const dy = e.clientY - orbit.lastY;
    orbit.lastX = e.clientX; orbit.lastY = e.clientY;
    const panSpeed = orbit.spherical.radius * 0.002;
    const forward = new THREE.Vector3().subVectors(orbit.target, camera.position).normalize();
    const right = new THREE.Vector3().crossVectors(forward, camera.up).normalize();
    const camUp = new THREE.Vector3().crossVectors(right, forward).normalize();
    orbit.target.addScaledVector(right, -dx * panSpeed);
    orbit.target.addScaledVector(camUp, dy * panSpeed);
    updateCameraFromOrbit();
  }
});

window.addEventListener('pointerup', () => {
  orbit.dragging = false; orbit.panning = false;
});

renderer.domElement.addEventListener('wheel', (e) => {
  e.preventDefault();
  orbit.spherical.radius *= (1 + e.deltaY * 0.001);
  orbit.spherical.radius = Math.max(10, Math.min(800, orbit.spherical.radius));
  updateCameraFromOrbit();
}, { passive: false });

renderer.domElement.addEventListener('contextmenu', e => e.preventDefault());

document.getElementById('cam-reset').addEventListener('click', () => {
  camera.position.set(CAM_DEFAULTS.x, CAM_DEFAULTS.y, CAM_DEFAULTS.z);
  orbit.target.set(CAM_DEFAULTS.lookX, CAM_DEFAULTS.lookY, CAM_DEFAULTS.lookZ);
  camera.fov = CAM_DEFAULTS.fov;
  camera.updateProjectionMatrix();
  camera.lookAt(orbit.target);
  const offset = new THREE.Vector3().subVectors(camera.position, orbit.target);
  orbit.spherical.setFromVector3(offset);
});
document.getElementById('cam-print').addEventListener('click', () => {
  console.log('CAM_DEFAULTS:', JSON.stringify({
    x: Math.round(camera.position.x), y: Math.round(camera.position.y), z: Math.round(camera.position.z),
    lookX: Math.round(orbit.target.x), lookY: Math.round(orbit.target.y), lookZ: Math.round(orbit.target.z),
    fov: Math.round(camera.fov),
  }));
});

// ── Note label overlay projection ─────────────────────────────
const noteLabelsContainer = document.getElementById('note-labels');
function updateNoteLabels() {
  // Sync DOM elements count
  while (noteLabelsContainer.children.length > noteLabelData.length)
    noteLabelsContainer.removeChild(noteLabelsContainer.lastChild);
  while (noteLabelsContainer.children.length < noteLabelData.length) {
    const el = document.createElement('div');
    el.className = 'note-label';
    noteLabelsContainer.appendChild(el);
  }
  const w = renderer.domElement.clientWidth;
  const h = renderer.domElement.clientHeight;
  for (let i = 0; i < noteLabelData.length; i++) {
    const d = noteLabelData[i];
    const el = noteLabelsContainer.children[i];
    // Project world position to screen
    const v = d.worldPos.clone().project(camera);
    if (v.z > 1) { el.style.display = 'none'; continue; }
    const sx = (v.x * 0.5 + 0.5) * w;
    const sy = (-v.y * 0.5 + 0.5) * h;
    const r = (d.hex >> 16) & 0xff, g = (d.hex >> 8) & 0xff, b = d.hex & 0xff;
    // Scale text with camera distance
    const dist = camera.position.distanceTo(d.worldPos);
    const fontSize = Math.max(14, Math.min(140, 9600 / dist));
    const strokeW = Math.max(1.5, fontSize * 0.09);
    // Choose outline color: white for dark fills, black for light fills
    const lum = (r * 0.299 + g * 0.587 + b * 0.114) / 255;
    const strokeColor = lum < 0.45 ? 'rgba(255,255,255,0.85)' : 'rgba(0,0,0,0.7)';
    el.style.display = '';
    el.style.left = sx + 'px';
    el.style.top = sy + 'px';
    el.style.fontSize = fontSize + 'px';
    el.style.color = `rgb(${r},${g},${b})`;
    el.style.webkitTextStroke = strokeW + 'px ' + strokeColor;
    el.style.textShadow = `0 2px 4px rgba(0,0,0,0.45)`;
    el.style.zIndex = d.strId != null ? d.strId + 10 : 10;
    el.textContent = displayName(d.name);
  }
}

  requestAnimationFrame(animate);

})();
