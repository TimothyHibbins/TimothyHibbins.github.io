<!doctype html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Atmosphere Column</title>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.2/lib/p5.min.js"></script>
</head>

<body>
    <main></main>
    <script>
      // Cache-bust the sketch JS so iterative edits always show up. The
      // ?_t= query string forces the browser to refetch.
      (function(){
        const s = document.createElement('script');
        s.src = 'js/Atmosphere_Column.js?_t=' + Date.now();
        s.charset = 'UTF-8';
        document.body.appendChild(s);
      })();
    </script>
</body>

</html>
